spring.datasource.url=jdbc:postgresql://localhost:5432/yomudb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.h2.console.enabled=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

## To activate: --spring.profiles.active=prod
## ^^ if using PostgreSQL

# ===== Grafana Cloud OTLP (metrics push) =====
management.otlp.metrics.export.url=https://otlp-gateway-prod-ap-southeast-2.grafana.net/otlp/v1/metrics
management.otlp.metrics.export.headers.authorization=${GRAFANA_OTLP_AUTH}
management.otlp.metrics.export.step=30s