# ===== PostgreSQL (Cloud SQL via socket factory, or override via env vars) =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/yomudb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false

## Activate with: --spring.profiles.active=prod
## Override SPRING_DATASOURCE_URL, DB_USERNAME, DB_PASSWORD via env vars.
## For Cloud Run with Cloud SQL socket:
##   SPRING_DATASOURCE_URL=jdbc:postgresql:///yomudb?unixSocketPath=/cloudsql/INSTANCE&socketFactory=com.google.cloud.sql.postgres.SocketFactory

# ===== Grafana Cloud OTLP (metrics push) =====
management.otlp.metrics.export.url=https://otlp-gateway-prod-ap-southeast-2.grafana.net/otlp/v1/metrics
management.otlp.metrics.export.headers.authorization=${GRAFANA_OTLP_AUTH}
management.otlp.metrics.export.step=30s
