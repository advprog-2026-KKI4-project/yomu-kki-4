<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Yomu Auth</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111016;
            color: #f7ecf4;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: #564b8f;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            text-align: center;
        }
        .container h1 {
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 1.5rem;
        }
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #a096e0;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            background: #3d3770;
            border: 1px solid #6b5ce0;
            border-radius: 6px;
            color: #f7ecf4;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: #f5b17f;
        }
        .btn {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            box-sizing: border-box;
            transition: background 0.2s;
            font-size: 16px;
        }
        .btn-primary {
            background: #6b5ce0;
            color: #f7ecf4;
            margin-top: 10px;
        }
        .btn-primary:hover {
            background: #564b8f;
        }
        .footer-text {
            margin-top: 20px;
            font-size: 14px;
            color: #a096e0;
        }
        .footer-text a {
            color: #f5b17f;
            text-decoration: none;
        }
        .footer-text a:hover {
            text-decoration: underline;
        }
        .error-message {
            color: #ff6b6b;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }
        .success-message {
            color: #51cf66;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Create an Account</h1>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message">Registration successful! Redirecting...</div>

    <form id="registerForm">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label for="phone">Phone (Optional)</label>
            <input type="text" id="phone" name="phone" class="form-control" placeholder="Enter your phone number">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Create a password (min 8 chars)" required minlength="8">
        </div>
        <button type="submit" class="btn btn-primary">Sign Up</button>
    </form>

    <div class="footer-text">
        Already have an account? <a th:href="@{/login}">Log in</a>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;

        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');

        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username,
                    email: email || null,
                    phone: phone || null,
                    password
                })
            });

            if (response.ok) {
                successDiv.style.display = 'block';
                setTimeout(() => {
                    window.location.href = '/dashboard';
                }, 1000);
            } else {
                const data = await response.json();
                let errorMessage = '';

                if (typeof data === 'object' && data !== null) {
                    const errors = Object.entries(data)
                        .filter(([key]) => key !== 'message')
                        .map(([field, msg]) => `${field}: ${msg}`)
                        .join('\n');
                    if (errors) {
                        errorMessage = errors;
                    }
                }

                if (!errorMessage && data.message) {
                    errorMessage = data.message;
                }

                errorDiv.textContent = errorMessage || 'Registration failed. Please check your inputs.';
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            errorDiv.textContent = 'An error occurred. Please try again later.';
            errorDiv.style.display = 'block';
        }
    });
</script>

</body>
</html>
