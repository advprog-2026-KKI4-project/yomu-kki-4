<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Yomu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .btn { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="auth-container">
    <h1>Create an Account</h1>
    <p class="auth-subtitle">Start your information literacy journey today</p>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message">Registration successful! Redirecting...</div>

    <form id="registerForm">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label for="phone">Phone (Optional)</label>
            <input type="text" id="phone" name="phone" class="form-control" placeholder="Enter your phone number">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Create a password (min 8 chars)" required minlength="8">
        </div>
        <button type="submit" class="btn btn-primary">Sign Up</button>
    </form>

    <div class="footer-text">
        Already have an account? <a th:href="@{/login}">Log in</a>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;

        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');

        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username,
                    email: email || null,
                    phone: phone || null,
                    password
                })
            });

            if (response.ok) {
                successDiv.style.display = 'block';
                setTimeout(() => {
                    window.location.href = '/dashboard';
                }, 1000);
            } else {
                const data = await response.json();
                let errorMessage = '';

                if (typeof data === 'object' && data !== null) {
                    const errors = Object.entries(data)
                        .filter(([key]) => key !== 'message')
                        .map(([field, msg]) => `${field}: ${msg}`)
                        .join('\n');
                    if (errors) {
                        errorMessage = errors;
                    }
                }

                if (!errorMessage && data.message) {
                    errorMessage = data.message;
                }

                errorDiv.textContent = errorMessage || 'Registration failed. Please check your inputs.';
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            errorDiv.textContent = 'An error occurred. Please try again later.';
            errorDiv.style.display = 'block';
        }
    });
</script>

</body>
</html>
