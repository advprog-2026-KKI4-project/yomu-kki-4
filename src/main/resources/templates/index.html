<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Yomu — Information Literacy Gamification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 20px; }
        .landing-card { background: var(--bg-card); border-radius: 24px; padding: 56px 48px; max-width: 560px; width: 100%; text-align: center; box-shadow: var(--hero-shadow); border: 1px solid var(--border-soft); }
        .landing-logo { width: 64px; height: 64px; background: var(--primary-purple); border-radius: 18px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; color: var(--text-on-dark); font-size: 28px; font-weight: 900; }
        .brand { font-size: 3.5rem; font-weight: 900; color: var(--text-heading); margin-bottom: 0.5rem; letter-spacing: -2px; }
        .tagline { font-size: 1.05rem; color: var(--text-muted); margin-bottom: 2rem; line-height: 1.6; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .landing-btn { padding: 13px 30px; border-radius: 12px; font-weight: 700; font-size: 0.95rem; text-decoration: none; transition: background 0.15s, transform 0.1s; display: inline-flex; align-items: center; gap: 8px; }
        .landing-btn:hover { transform: translateY(-1px); }
        .landing-btn.primary { background: var(--primary-purple); color: var(--text-on-dark); }
        .landing-btn.primary:hover { background: var(--primary-purple-hover); }
        .landing-btn.outline { background: transparent; color: var(--primary-purple); border: 1.5px solid var(--primary-purple); }
        .landing-btn.outline:hover { background: var(--primary-purple-light); }
        .page-footer { position: fixed; bottom: 20px; left: 0; right: 0; text-align: center; font-size: 0.8rem; color: var(--text-muted); }
    </style>
</head>
<body>
<div class="landing-card">
    <div class="landing-logo">Y</div>
    <div class="brand">Yomu</div>
    <div class="tagline">Level up your information literacy through gamified learning, quizzes, and community challenges.</div>
    <div class="btn-group">
        <a th:href="@{/login}" class="landing-btn primary">Log In</a>
        <a th:href="@{/register}" class="landing-btn outline">Register</a>
    </div>
</div>
<div class="page-footer">YOMU KKI4 — AdvProg 2026</div>
</body>
</html>
