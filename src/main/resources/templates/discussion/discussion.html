<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Yomu - Discussion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .discussion-card { background: white; border-radius: 20px; padding: 30px; box-shadow: var(--card-shadow); max-width: 900px; margin: 0 auto; }

        .discussion-header { padding-bottom: 20px; border-bottom: 1px solid #eee; margin-bottom: 24px; }
        .discussion-header h1 { color: var(--primary-purple); font-weight: 800; margin: 8px 0 6px; }
        .discussion-header .meta { color: #888; font-size: 0.9rem; }
        .discussion-header .category-pill { display: inline-block; background: #ede7f6; color: var(--primary-purple); padding: 2px 12px; border-radius: 50px; font-size: 0.78rem; font-weight: 700; margin-left: 6px; }

        .auth-bar { background: #f3effb; border-radius: 14px; padding: 12px 18px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .auth-bar .user-info { color: var(--primary-purple); font-weight: 600; }
        .auth-bar .role-badge { background: var(--primary-purple); color: white; border-radius: 50px; padding: 2px 10px; font-size: 0.75rem; margin-left: 6px; }
        .auth-bar .role-badge.admin { background: #e65100; }

        .comment-box { background-color: #ede7f6; border-radius: 16px; margin-bottom: 14px; padding: 16px 18px; border-left: 6px solid #b39ddb; }
        .comment-box.is-reply { margin-left: 40px; background-color: #f3effb; border-left-color: #d1c4e9; }
        .comment-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .comment-avatar { width: 34px; height: 34px; border-radius: 50%; background: white; border: 2px solid var(--primary-purple); display: flex; align-items: center; justify-content: center; color: var(--primary-purple); font-weight: bold; }
        .comment-author { font-weight: 700; color: #311b92; }
        .comment-time { color: #888; font-size: 0.8rem; }
        .comment-content { color: #2c2c2c; margin: 4px 0 10px; white-space: pre-wrap; word-break: break-word; }
        .comment-actions { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }

        .action-btn { background: white; border: 1.5px solid #b39ddb; color: var(--primary-purple); border-radius: 50px; padding: 4px 12px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.15s; text-decoration: none; display: inline-block; }
        .action-btn:hover { background: var(--primary-purple); color: white; }
        .action-btn.danger { border-color: #ef9a9a; color: #c62828; }
        .action-btn.danger:hover { background: #c62828; color: white; }
        .action-btn.admin { border-color: #ffb74d; color: #e65100; }
        .action-btn.admin:hover { background: #e65100; color: white; }

        .reaction-btn { background: white; border: 1.5px solid #d1c4e9; color: var(--primary-purple); border-radius: 50px; padding: 3px 10px; font-size: 0.9rem; cursor: pointer; transition: all 0.15s; }
        .reaction-btn:hover { background: #ede7f6; }
        .reaction-btn.active { background: var(--primary-purple); color: white; border-color: var(--primary-purple); }
        .reaction-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .reaction-count { font-weight: 700; margin-left: 4px; }

        .composer { background-color: #f3effb; border-radius: 16px; padding: 16px 18px; margin-bottom: 20px; border: 2px dashed #b39ddb; }
        .composer textarea { border: 1.5px solid #d1c4e9; border-radius: 12px; padding: 10px; width: 100%; resize: vertical; outline: none; font-family: inherit; box-sizing: border-box; }
        .composer textarea:focus { border-color: var(--primary-purple); }

        .btn-ghost { background: transparent; color: var(--primary-purple); border: none; font-weight: 600; padding: 8px 14px; cursor: pointer; }

        .auth-warning { background: #fff3cd; color: #856404; padding: 14px 20px; border-radius: 14px; margin-bottom: 20px; }
        .auth-warning a { color: var(--primary-purple); font-weight: 700; }

        .material-missing { background: #ffebee; color: #c62828; padding: 14px 20px; border-radius: 14px; margin-bottom: 20px; }

        .empty-state { text-align: center; padding: 50px 20px; color: #999; }
        .reply-area { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #d1c4e9; display: none; }
        .reply-area.open { display: block; }
        .reply-area textarea { border: 1.5px solid #d1c4e9; border-radius: 12px; padding: 8px; width: 100%; resize: vertical; outline: none; font-family: inherit; box-sizing: border-box; }
        .reply-area textarea:focus { border-color: var(--primary-purple); }

        .reactions-popover { display: flex; gap: 4px; flex-wrap: wrap; }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <h1 class="logo">YOMU</h1>
        <nav>
            <a th:href="@{/reading}" class="nav-item"><i class="fas fa-th-large"></i> Dashboard</a>
            <a th:href="@{/my-learning}" class="nav-item"><i class="fas fa-book-open"></i> My Learning</a>
            <a href="#" class="nav-item"><i class="fas fa-users"></i> Clan</a>
            <a href="#" class="nav-item"><i class="fas fa-trophy"></i> Rank</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="discussion-card">

            <div class="discussion-header">
                <a th:href="@{|/reading/${materialId}|}" class="back-link">← Back to material</a>
                <h1>
                    <i class="fas fa-comments"></i>
                    <span th:text="${materialTitle}">Material Title</span>
                    <span class="category-pill" th:if="${materialCategory != null and materialCategory != ''}" th:text="${materialCategory}">Category</span>
                </h1>
                <p class="meta">Share your thoughts and learn from others.</p>
            </div>

            <div th:if="${!materialExists}" class="material-missing">
                <i class="fas fa-exclamation-triangle"></i>
                This material does not exist or has been removed. New comments cannot be posted.
            </div>

            <div class="auth-bar">
                <div id="authInfo" class="user-info">
                    <i class="fas fa-spinner fa-spin"></i> Loading...
                </div>
                <div id="authActions"></div>
            </div>

            <div id="authWarning" class="auth-warning" style="display:none;">
                <i class="fas fa-exclamation-triangle"></i>
                You're not logged in. <a th:href="@{/login}">Sign in</a> to post, reply, and react.
            </div>

            <div id="composer" class="composer" style="display:none;">
                <label class="fw-bold mb-2" style="color:var(--primary-purple); font-weight: 700;">
                    <i class="fas fa-comment-dots"></i> Share your thoughts
                </label>
                <textarea id="newCommentText" rows="3" placeholder="Write a comment..."></textarea>
                <div style="text-align: right; margin-top: 10px;">
                    <button class="btn btn-primary" onclick="postRootComment()">
                        <i class="fas fa-paper-plane"></i> Post Comment
                    </button>
                </div>
            </div>

            <div id="commentsList"></div>
        </div>
    </main>
</div>

<script th:inline="javascript">
    const MATERIAL_ID = /*[[${materialId}]]*/ '';
    const MATERIAL_EXISTS = /*[[${materialExists}]]*/ true;

    const REACTIONS = [
        { type: 'UPVOTE',   label: '👍' },
        { type: 'DOWNVOTE', label: '👎' },
        { type: 'LIKE',     label: '❤️' },
        { type: 'LOVE',     label: '😍' },
        { type: 'LAUGH',    label: '😂' },
        { type: 'WOW',      label: '😮' },
        { type: 'SAD',      label: '😢' },
        { type: 'ANGRY',    label: '😡' }
    ];

    let currentUser = null;

    document.addEventListener('DOMContentLoaded', async () => {
        await loadCurrentUser();
        await loadComments();
    });

    async function loadCurrentUser() {
        const info = document.getElementById('authInfo');
        const actions = document.getElementById('authActions');
        try {
            const res = await fetch('/api/auth/profile', { credentials: 'same-origin' });
            if (res.ok) {
                const p = await res.json();
                currentUser = { id: p.id, username: p.username, role: p.role };
                const badgeClass = p.role === 'ADMIN' ? 'role-badge admin' : 'role-badge';
                info.innerHTML = `<i class="fas fa-user-check"></i> Logged in as <strong>${escapeHtml(p.username)}</strong> <span class="${badgeClass}">${p.role}</span>`;
                actions.innerHTML = `<button class="action-btn danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>`;
                if (MATERIAL_EXISTS) {
                    document.getElementById('composer').style.display = 'block';
                }
                document.getElementById('authWarning').style.display = 'none';
            } else {
                showLoggedOut();
            }
        } catch {
            showLoggedOut();
        }
    }

    function showLoggedOut() {
        currentUser = null;
        document.getElementById('authInfo').innerHTML = `<i class="fas fa-user-times"></i> Not logged in`;
        document.getElementById('authActions').innerHTML = `
            <a href="/login" class="action-btn"><i class="fas fa-sign-in-alt"></i> Login</a>
            <a href="/register" class="action-btn"><i class="fas fa-user-plus"></i> Register</a>
        `;
        document.getElementById('composer').style.display = 'none';
        document.getElementById('authWarning').style.display = 'block';
    }

    function logout() {
        document.cookie = 'jwt=; Path=/; Expires=Thu, 01 Jan 1970 00:00:00 GMT';
        window.location.reload();
    }

    function isAdmin() { return currentUser && currentUser.role === 'ADMIN'; }
    function isLoggedIn() { return currentUser !== null; }

    async function loadComments() {
        const container = document.getElementById('commentsList');
        try {
            const res = await fetch(`/api/discussions/${encodeURIComponent(MATERIAL_ID)}`, {
                credentials: 'same-origin'
            });
            if (!res.ok) {
                container.innerHTML = `<div class="empty-state">Failed to load comments (HTTP ${res.status}).</div>`;
                return;
            }
            const comments = await res.json();
            renderComments(comments);
        } catch (e) {
            container.innerHTML = `<div class="empty-state">Network error loading comments.</div>`;
        }
    }

    function renderComments(comments) {
        const container = document.getElementById('commentsList');
        if (!comments || comments.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-comment-slash" style="font-size:3rem; color:#d1c4e9;"></i>
                    <p style="margin-top:12px;">No comments yet. Be the first to start the discussion!</p>
                </div>`;
            return;
        }

        const roots = comments.filter(c => !c.parentCommentId);
        const repliesByParent = {};
        comments.forEach(c => {
            if (c.parentCommentId) {
                (repliesByParent[c.parentCommentId] = repliesByParent[c.parentCommentId] || []).push(c);
            }
        });

        container.innerHTML = '';
        roots.forEach(root => {
            container.insertAdjacentHTML('beforeend', renderCommentHtml(root, false));
            (repliesByParent[root.id] || []).forEach(reply => {
                container.insertAdjacentHTML('beforeend', renderCommentHtml(reply, true));
            });
        });
    }

    function renderCommentHtml(c, isReply) {
        const initial = (c.authorUsername || '?').charAt(0).toUpperCase();
        const ts = c.createdAt ? new Date(c.createdAt).toLocaleString() : '';

        const reactionButtons = REACTIONS.map(r => {
            const count = (c.reactionCounts && c.reactionCounts[r.type]) || 0;
            const active = c.currentUserReaction === r.type ? 'active' : '';
            const disabled = !isLoggedIn() ? 'disabled' : '';
            return `<button class="reaction-btn ${active}" onclick="toggleReaction(${c.id}, '${r.type}')" ${disabled}>
                ${r.label}${count > 0 ? `<span class="reaction-count">${count}</span>` : ''}
            </button>`;
        }).join('');

        const ownerActions = c.ownedByCurrentUser ? `
            <button class="action-btn" onclick="startEdit(${c.id})"><i class="fas fa-pen"></i> Edit</button>
            <button class="action-btn danger" onclick="deleteOwn(${c.id})"><i class="fas fa-trash"></i> Delete</button>
        ` : '';

        const adminAction = (isAdmin() && !c.ownedByCurrentUser) ? `
            <button class="action-btn admin" onclick="adminDelete(${c.id})"><i class="fas fa-shield-alt"></i> Admin Delete</button>
        ` : '';

        const replyAction = (!isReply && isLoggedIn() && MATERIAL_EXISTS) ? `
            <button class="action-btn" onclick="toggleReplyArea(${c.id})"><i class="fas fa-reply"></i> Reply</button>
        ` : '';

        const replyArea = !isReply ? `
            <div class="reply-area" id="replyArea-${c.id}">
                <textarea id="replyText-${c.id}" rows="2" placeholder="Write a reply..."></textarea>
                <div style="text-align: right; margin-top: 8px;">
                    <button class="btn-ghost" onclick="toggleReplyArea(${c.id})">Cancel</button>
                    <button class="btn btn-primary" onclick="postReply(${c.id})">Post Reply</button>
                </div>
            </div>
        ` : '';

        return `
            <div class="comment-box ${isReply ? 'is-reply' : ''}" id="comment-${c.id}">
                <div class="comment-header">
                    <div class="comment-avatar">${initial}</div>
                    <div>
                        <div class="comment-author">${escapeHtml(c.authorUsername || 'Unknown')}</div>
                        <div class="comment-time">${ts}</div>
                    </div>
                </div>
                <div class="comment-content" id="content-${c.id}">${escapeHtml(c.content)}</div>
                <div class="comment-actions">
                    <div class="reactions-popover">${reactionButtons}</div>
                    ${replyAction}
                    ${ownerActions}
                    ${adminAction}
                </div>
                ${replyArea}
            </div>
        `;
    }

    function escapeHtml(s) {
        if (s == null) return '';
        return String(s)
            .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;').replaceAll("'", '&#39;');
    }

    async function postRootComment() {
        const text = document.getElementById('newCommentText').value.trim();
        if (!text) return;
        const ok = await postCommentRequest({ content: text, materialId: MATERIAL_ID, parentCommentId: null });
        if (ok) document.getElementById('newCommentText').value = '';
    }

    async function postReply(parentId) {
        const text = document.getElementById(`replyText-${parentId}`).value.trim();
        if (!text) return;
        await postCommentRequest({ content: text, materialId: MATERIAL_ID, parentCommentId: parentId });
    }

    async function postCommentRequest(body) {
        try {
            const res = await fetch('/api/discussions', {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                alert(err.error || err.message || 'Failed to post comment');
                return false;
            }
            await loadComments();
            return true;
        } catch {
            alert('Network error while posting comment.');
            return false;
        }
    }

    function toggleReplyArea(commentId) {
        document.getElementById(`replyArea-${commentId}`).classList.toggle('open');
    }

    async function toggleReaction(commentId, type) {
        if (!isLoggedIn()) return;
        try {
            const res = await fetch(`/api/discussions/${commentId}/reactions`, {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reactionType: type })
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                alert(err.error || 'Failed to react');
                return;
            }
            await loadComments();
        } catch {
            alert('Network error while reacting.');
        }
    }

    function startEdit(commentId) {
        const contentDiv = document.getElementById(`content-${commentId}`);
        const original = contentDiv.textContent;
        contentDiv.innerHTML = `
            <textarea id="editText-${commentId}" rows="3" style="border:1.5px solid #d1c4e9; border-radius:12px; padding:8px; width:100%; box-sizing:border-box;">${escapeHtml(original)}</textarea>
            <div style="margin-top: 8px; text-align: right;">
                <button class="btn-ghost" onclick="loadComments()">Cancel</button>
                <button class="btn btn-primary" onclick="saveEdit(${commentId})">Save</button>
            </div>
        `;
    }

    async function saveEdit(commentId) {
        const newContent = document.getElementById(`editText-${commentId}`).value.trim();
        if (!newContent) return;
        try {
            const res = await fetch(`/api/discussions/${commentId}`, {
                method: 'PUT',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: newContent })
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                alert(err.error || 'Failed to edit');
                return;
            }
            await loadComments();
        } catch {
            alert('Network error while editing.');
        }
    }

    async function deleteOwn(commentId) {
        if (!confirm('Delete this comment?')) return;
        try {
            const res = await fetch(`/api/discussions/${commentId}`, {
                method: 'DELETE',
                credentials: 'same-origin'
            });
            if (!res.ok && res.status !== 204) {
                const err = await res.json().catch(() => ({}));
                alert(err.error || 'Failed to delete');
                return;
            }
            await loadComments();
        } catch {
            alert('Network error while deleting.');
        }
    }

    async function adminDelete(commentId) {
        if (!confirm('Admin delete this comment? This cannot be undone.')) return;
        try {
            const res = await fetch(`/api/discussions/admin/${commentId}`, {
                method: 'DELETE',
                credentials: 'same-origin'
            });
            if (!res.ok && res.status !== 204) {
                const err = await res.json().catch(() => ({}));
                alert(err.error || 'Failed to admin-delete');
                return;
            }
            await loadComments();
        } catch {
            alert('Network error while admin-deleting.');
        }
    }
</script>
</body>
</html>
