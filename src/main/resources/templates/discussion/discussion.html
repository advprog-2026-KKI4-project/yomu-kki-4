<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Yomu - Discussion Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #fce4d6; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .main-card { background-color: white; border-radius: 25px; max-width: 900px; margin: 0 auto; padding: 30px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }

        .auth-bar { background: #f3effb; border-radius: 14px; padding: 12px 18px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .auth-bar .user-info { color: #5e35b1; font-weight: 600; }
        .auth-bar .role-badge { background: #5e35b1; color: white; border-radius: 50px; padding: 2px 10px; font-size: 0.75rem; margin-left: 6px; }
        .auth-bar .role-badge.admin { background: #e65100; }

        .comment-box { background-color: #ede7f6; border-radius: 20px; margin-bottom: 15px; padding: 18px 20px; border-left: 8px solid #b39ddb; }
        .comment-box.is-reply { margin-left: 50px; background-color: #f3effb; border-left-color: #d1c4e9; }
        .comment-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .comment-avatar { width: 36px; height: 36px; border-radius: 50%; background: white; border: 2px solid #5e35b1; display: flex; align-items: center; justify-content: center; color: #5e35b1; font-weight: bold; }
        .comment-author { font-weight: 700; color: #311b92; }
        .comment-time { color: #888; font-size: 0.8rem; }
        .comment-content { color: #2c2c2c; margin: 4px 0 10px; white-space: pre-wrap; word-break: break-word; }
        .comment-actions { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }

        .action-btn { background: white; border: 1.5px solid #b39ddb; color: #5e35b1; border-radius: 50px; padding: 4px 12px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
        .action-btn:hover { background: #5e35b1; color: white; }
        .action-btn.danger { border-color: #ef9a9a; color: #c62828; }
        .action-btn.danger:hover { background: #c62828; color: white; }
        .action-btn.admin { border-color: #ffb74d; color: #e65100; }
        .action-btn.admin:hover { background: #e65100; color: white; }

        .reaction-btn { background: white; border: 1.5px solid #d1c4e9; color: #5e35b1; border-radius: 50px; padding: 3px 10px; font-size: 0.9rem; cursor: pointer; transition: all 0.15s; }
        .reaction-btn:hover { background: #ede7f6; }
        .reaction-btn.active { background: #5e35b1; color: white; border-color: #5e35b1; }
        .reaction-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .reaction-count { font-weight: 700; margin-left: 4px; }

        .composer { background-color: #f3effb; border-radius: 20px; padding: 18px 20px; margin-bottom: 25px; border: 2px dashed #b39ddb; }
        .composer textarea { border: 1.5px solid #d1c4e9; border-radius: 12px; padding: 10px; width: 100%; resize: vertical; outline: none; font-family: inherit; }
        .composer textarea:focus { border-color: #5e35b1; }

        .btn-primary-purple { background: #5e35b1; color: white; border: none; border-radius: 50px; padding: 8px 22px; font-weight: 700; }
        .btn-primary-purple:hover { background: #4527a0; color: white; }
        .btn-ghost { background: transparent; color: #5e35b1; border: none; font-weight: 600; padding: 8px 14px; }

        .auth-warning { background: #fff3cd; color: #856404; padding: 14px 20px; border-radius: 14px; margin-bottom: 20px; }
        .auth-warning a { color: #5e35b1; font-weight: 700; }

        .empty-state { text-align: center; padding: 50px 20px; color: #999; }
        .reply-area { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #d1c4e9; display: none; }
        .reply-area.open { display: block; }
        .reply-area textarea { border: 1.5px solid #d1c4e9; border-radius: 12px; padding: 8px; width: 100%; resize: vertical; outline: none; font-family: inherit; }
        .reply-area textarea:focus { border-color: #5e35b1; }

        .reactions-popover { display: flex; gap: 4px; flex-wrap: wrap; }
        .material-tag { background: #5e35b1; color: white; padding: 4px 12px; border-radius: 50px; font-size: 0.85rem; font-family: monospace; }
    </style>
</head>
<body>

<div class="main-card">
    <h1 class="text-center mb-2" style="color: #ffb74d; font-weight: 800;">
        <i class="bi bi-chat-square-dots"></i> Discussion Test
    </h1>
    <p class="text-center text-muted mb-4">
        Material: <span class="material-tag" id="materialIdTag">test-material-001</span>
    </p>

    <div class="auth-bar">
        <div id="authInfo" class="user-info">
            <i class="bi bi-hourglass-split"></i> Loading...
        </div>
        <div id="authActions"></div>
    </div>

    <div id="authWarning" class="auth-warning" style="display:none;">
        <i class="bi bi-exclamation-triangle-fill"></i>
        You're not logged in. <a href="/login">Sign in</a> to post, reply, and react.
    </div>

    <div id="composer" class="composer" style="display:none;">
        <label class="fw-bold mb-2" style="color:#5e35b1;">
            <i class="bi bi-chat-dots"></i> Share your thoughts
        </label>
        <textarea id="newCommentText" rows="3" placeholder="Write a comment..."></textarea>
        <div class="text-end mt-2">
            <button class="btn-primary-purple" onclick="postRootComment()">
                <i class="bi bi-send"></i> Post Comment
            </button>
        </div>
    </div>

    <div id="commentsList"></div>
</div>

<script>
    // Hardcoded for testing. Will come from URL/Module-2 later.
    const MATERIAL_ID = 'test-material-001';

    const REACTIONS = [
        { type: 'UPVOTE',   label: '👍' },
        { type: 'DOWNVOTE', label: '👎' },
        { type: 'LIKE',     label: '❤️' },
        { type: 'LOVE',     label: '😍' },
        { type: 'LAUGH',    label: '😂' },
        { type: 'WOW',      label: '😮' },
        { type: 'SAD',      label: '😢' },
        { type: 'ANGRY',    label: '😡' }
    ];

    let currentUser = null;

    document.addEventListener('DOMContentLoaded', async () => {
        document.getElementById('materialIdTag').textContent = MATERIAL_ID;
        await loadCurrentUser();
        await loadComments();
    });

    async function loadCurrentUser() {
        const info = document.getElementById('authInfo');
        const actions = document.getElementById('authActions');
        try {
            const res = await fetch('/api/auth/profile', { credentials: 'same-origin' });
            if (res.ok) {
                const p = await res.json();
                currentUser = { id: p.id, username: p.username, role: p.role };
                const badgeClass = p.role === 'ADMIN' ? 'role-badge admin' : 'role-badge';
                info.innerHTML = `<i class="bi bi-person-check-fill"></i> Logged in as <strong>${escapeHtml(p.username)}</strong> <span class="${badgeClass}">${p.role}</span>`;
                actions.innerHTML = `<button class="action-btn danger" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</button>`;
                document.getElementById('composer').style.display = 'block';
                document.getElementById('authWarning').style.display = 'none';
            } else {
                showLoggedOut();
            }
        } catch {
            showLoggedOut();
        }
    }

    function showLoggedOut() {
        currentUser = null;
        document.getElementById('authInfo').innerHTML = `<i class="bi bi-person-x"></i> Not logged in`;
        document.getElementById('authActions').innerHTML = `
            <a href="/login" class="action-btn"><i class="bi bi-box-arrow-in-right"></i> Login</a>
            <a href="/register" class="action-btn"><i class="bi bi-person-plus"></i> Register</a>
        `;
        document.getElementById('composer').style.display = 'none';
        document.getElementById('authWarning').style.display = 'block';
    }

    function logout() {
        // Clear the jwt cookie by setting an expired one on the same path.
        document.cookie = 'jwt=; Path=/; Expires=Thu, 01 Jan 1970 00:00:00 GMT';
        window.location.reload();
    }

    function isAdmin() { return currentUser && currentUser.role === 'ADMIN'; }
    function isLoggedIn() { return currentUser !== null; }

    async function loadComments() {
        const container = document.getElementById('commentsList');
        try {
            const res = await fetch(`/api/discussions/${encodeURIComponent(MATERIAL_ID)}`, {
                credentials: 'same-origin'
            });
            if (!res.ok) {
                container.innerHTML = `<div class="empty-state">Failed to load comments (HTTP ${res.status}).</div>`;
                return;
            }
            const comments = await res.json();
            renderComments(comments);
        } catch (e) {
            container.innerHTML = `<div class="empty-state">Network error loading comments.</div>`;
        }
    }

    function renderComments(comments) {
        const container = document.getElementById('commentsList');
        if (!comments || comments.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="bi bi-chat-square-text" style="font-size:3rem; color:#d1c4e9;"></i>
                    <p class="mt-3">No comments yet. Be the first to start the discussion!</p>
                </div>`;
            return;
        }

        const roots = comments.filter(c => !c.parentCommentId);
        const repliesByParent = {};
        comments.forEach(c => {
            if (c.parentCommentId) {
                (repliesByParent[c.parentCommentId] = repliesByParent[c.parentCommentId] || []).push(c);
            }
        });

        container.innerHTML = '';
        roots.forEach(root => {
            container.insertAdjacentHTML('beforeend', renderCommentHtml(root, false));
            (repliesByParent[root.id] || []).forEach(reply => {
                container.insertAdjacentHTML('beforeend', renderCommentHtml(reply, true));
            });
        });
    }

    function renderCommentHtml(c, isReply) {
        const initial = (c.authorUsername || '?').charAt(0).toUpperCase();
        const ts = c.createdAt ? new Date(c.createdAt).toLocaleString() : '';

        const reactionButtons = REACTIONS.map(r => {
            const count = (c.reactionCounts && c.reactionCounts[r.type]) || 0;
            const active = c.currentUserReaction === r.type ? 'active' : '';
            const disabled = !isLoggedIn() ? 'disabled' : '';
            return `<button class="reaction-btn ${active}" onclick="toggleReaction(${c.id}, '${r.type}')" ${disabled}>
                ${r.label}${count > 0 ? `<span class="reaction-count">${count}</span>` : ''}
            </button>`;
        }).join('');

        const ownerActions = c.ownedByCurrentUser ? `
            <button class="action-btn" onclick="startEdit(${c.id})"><i class="bi bi-pencil"></i> Edit</button>
            <button class="action-btn danger" onclick="deleteOwn(${c.id})"><i class="bi bi-trash"></i> Delete</button>
        ` : '';

        const adminAction = (isAdmin() && !c.ownedByCurrentUser) ? `
            <button class="action-btn admin" onclick="adminDelete(${c.id})"><i class="bi bi-shield-exclamation"></i> Admin Delete</button>
        ` : '';

        const replyAction = (!isReply && isLoggedIn()) ? `
            <button class="action-btn" onclick="toggleReplyArea(${c.id})"><i class="bi bi-reply"></i> Reply</button>
        ` : '';

        const replyArea = !isReply ? `
            <div class="reply-area" id="replyArea-${c.id}">
                <textarea id="replyText-${c.id}" rows="2" placeholder="Write a reply..."></textarea>
                <div class="text-end mt-2">
                    <button class="btn-ghost" onclick="toggleReplyArea(${c.id})">Cancel</button>
                    <button class="btn-primary-purple" onclick="postReply(${c.id})">Post Reply</button>
                </div>
            </div>
        ` : '';

        return `
            <div class="comment-box ${isReply ? 'is-reply' : ''}" id="comment-${c.id}">
                <div class="comment-header">
                    <div class="comment-avatar">${initial}</div>
                    <div>
                        <div class="comment-author">${escapeHtml(c.authorUsername || 'Unknown')}</div>
                        <div class="comment-time">${ts}</div>
                    </div>
                </div>
                <div class="comment-content" id="content-${c.id}">${escapeHtml(c.content)}</div>
                <div class="comment-actions">
                    <div class="reactions-popover">${reactionButtons}</div>
                    ${replyAction}
                    ${ownerActions}
                    ${adminAction}
                </div>
                ${replyArea}
            </div>
        `;
    }

    function escapeHtml(s) {
        if (s == null) return '';
        return String(s)
            .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;').replaceAll("'", '&#39;');
    }

    async function postRootComment() {
        const text = document.getElementById('newCommentText').value.trim();
        if (!text) return;
        const ok = await postCommentRequest({ content: text, materialId: MATERIAL_ID, parentCommentId: null });
        if (ok) document.getElementById('newCommentText').value = '';
    }

    async function postReply(parentId) {
        const text = document.getElementById(`replyText-${parentId}`).value.trim();
        if (!text) return;
        await postCommentRequest({ content: text, materialId: MATERIAL_ID, parentCommentId: parentId });
    }

    async function postCommentRequest(body) {
        try {
            const res = await fetch('/api/discussions', {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                alert(err.error || err.message || 'Failed to post comment');
                return false;
            }
            await loadComments();
            return true;
        } catch {
            alert('Network error while posting comment.');
            return false;
        }
    }

    function toggleReplyArea(commentId) {
        document.getElementById(`replyArea-${commentId}`).classList.toggle('open');
    }

    async function toggleReaction(commentId, type) {
        if (!isLoggedIn()) return;
        try {
            const res = await fetch(`/api/discussions/${commentId}/reactions`, {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reactionType: type })
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                alert(err.error || 'Failed to react');
                return;
            }
            await loadComments();
        } catch {
            alert('Network error while reacting.');
        }
    }

    function startEdit(commentId) {
        const contentDiv = document.getElementById(`content-${commentId}`);
        const original = contentDiv.textContent;
        contentDiv.innerHTML = `
            <textarea id="editText-${commentId}" rows="3" style="border:1.5px solid #d1c4e9; border-radius:12px; padding:8px; width:100%;">${escapeHtml(original)}</textarea>
            <div class="mt-2 text-end">
                <button class="btn-ghost" onclick="loadComments()">Cancel</button>
                <button class="btn-primary-purple" onclick="saveEdit(${commentId})">Save</button>
            </div>
        `;
    }

    async function saveEdit(commentId) {
        const newContent = document.getElementById(`editText-${commentId}`).value.trim();
        if (!newContent) return;
        try {
            const res = await fetch(`/api/discussions/${commentId}`, {
                method: 'PUT',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: newContent })
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                alert(err.error || 'Failed to edit');
                return;
            }
            await loadComments();
        } catch {
            alert('Network error while editing.');
        }
    }

    async function deleteOwn(commentId) {
        if (!confirm('Delete this comment?')) return;
        try {
            const res = await fetch(`/api/discussions/${commentId}`, {
                method: 'DELETE',
                credentials: 'same-origin'
            });
            if (!res.ok && res.status !== 204) {
                const err = await res.json().catch(() => ({}));
                alert(err.error || 'Failed to delete');
                return;
            }
            await loadComments();
        } catch {
            alert('Network error while deleting.');
        }
    }

    async function adminDelete(commentId) {
        if (!confirm('Admin delete this comment? This cannot be undone.')) return;
        try {
            const res = await fetch(`/api/discussions/admin/${commentId}`, {
                method: 'DELETE',
                credentials: 'same-origin'
            });
            if (!res.ok && res.status !== 204) {
                const err = await res.json().catch(() => ({}));
                alert(err.error || 'Failed to admin-delete');
                return;
            }
            await loadComments();
        } catch {
            alert('Network error while admin-deleting.');
        }
    }
</script>
</body>
</html>
