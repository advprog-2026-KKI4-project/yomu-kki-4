<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard — Yomu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .logout-link {
            margin-top: auto;
            padding: 12px 18px;
            color: var(--danger);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 12px;
            transition: background 0.15s;
            background: none;
            border: none;
            cursor: pointer;
            text-align: left;
            width: 100%;
            font-family: inherit;
        }
        .logout-link:hover {
            background: #ffebee;
        }
    </style>
</head>
<body>

<div class="app-container">

    <aside class="sidebar">
        <h1 class="logo">YOMU</h1>
        <nav>
            <a th:href="@{/dashboard}" class="nav-item active"><i class="fas fa-home"></i> Dashboard</a>
            <a th:href="@{/reading}" class="nav-item"><i class="fas fa-book-open"></i> Learning</a>
            <a th:href="@{/achievements}" class="nav-item"><i class="fas fa-trophy"></i> Achievements</a>
            <a th:href="@{/daily-missions}" class="nav-item"><i class="fas fa-bullseye"></i> Missions</a>
            <a th:href="@{/clans/my-clan}" class="nav-item"><i class="fas fa-users"></i> Clan</a>
            <a th:href="@{/leaderboard}" class="nav-item"><i class="fas fa-medal"></i> Leaderboard</a>
            <a th:href="@{/discussions}" class="nav-item"><i class="fas fa-comments"></i> Discussions</a>
        </nav>
        <form th:action="@{/logout}" method="post" style="margin-top: auto; padding: 0 4px;">
            <button type="submit" class="logout-link"><i class="fas fa-sign-out-alt"></i> Log Out</button>
        </form>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="greeting-block">
                <div class="user-profile">
                    <div class="avatar"><i class="fas fa-user"></i></div>
                    <div>
                        <h2 th:text="'Hi, ' + ${username} + '!'">Hi, Learner!</h2>
                        <div class="greeting-sub">Welcome back. Pick a module to continue your learning journey.</div>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <div class="stat-chip purple">
                    <i class="fas fa-id-badge"></i>
                    <span th:text="${role}">STUDENT</span>
                </div>
            </div>
        </header>
    </main>
</div>

</body>
</html>
