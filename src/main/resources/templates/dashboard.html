<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Dashboard — Yomu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111016;
            color: #fdfaf6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .card {
            background: #201e2b;
            padding: 40px 50px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-width: 480px;
            width: 100%;
        }
        .card h1 {
            font-size: 1.75rem;
            margin-bottom: 8px;
            color: #f5b17f;
        }
        .card .username {
            font-size: 1.1rem;
            color: #ccc;
            margin-bottom: 24px;
        }
        .card .role-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #2a2836;
            color: #f5b17f;
            border: 1px solid #3c3a4a;
            margin-bottom: 28px;
        }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s;
        }
        .btn-danger {
            background: #ff6b6b;
            color: #fff;
        }
        .btn-danger:hover {
            background: #e05555;
        }
        .footer {
            margin-top: 24px;
            font-size: 0.85rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Welcome back!</h1>
        <div class="username" sec:authentication="name">User</div>
        <div class="role-badge" sec:authentication="principal.authorities[0]">ROLE_STUDENT</div>

        <div style="margin-bottom: 16px;">
            <a th:href="@{/reading}" class="btn" style="background: #5b4b8a; color: #fff;">Go to Learning</a>
        </div>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-danger">Log Out</button>
        </form>
    </div>

    <div class="footer">YOMU KKI4 — AdvProg 2026</div>

</body>
</html>
