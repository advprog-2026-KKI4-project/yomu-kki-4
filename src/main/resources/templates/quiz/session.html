<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Yomu - Quiz Session</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <script th:src="@{/js/quiz-timer.js}" defer></script>
    <script th:src="@{/js/quiz-session.js}" defer></script>
</head>
<body class="focused-view"> <main class="quiz-focus-container">
    <header class="quiz-header">
        <div class="timer-badge">
            ⏱ <span id="timer-display">0:00</span>
        </div>
    </header>

    <div class="content-box">
        <form id="quiz-form" th:action="@{/api/materials/{id}/submit(id=${material.id})}" method="post">
            <input type="hidden" id="time-limit" th:value="${material.timeLimit}">
            <input type="hidden" id="duration-input" name="duration" value="0">

            <h1 class="material-title" style="font-size: 28px; text-align: center; margin-bottom: 40px;"
                th:text="'Quiz: ' + ${material.title}"></h1>

            <div class="question-block" th:each="question, iter : ${material.questions}" style="margin-bottom: 40px;">
                <p class="reading-text" style="font-weight: 700; margin-bottom: 20px;"
                   th:text="(${iter.index} + 1) + '. ' + ${question.questionText}"></p>

                <div class="options-stack">
                    <div th:each="option, optIter : ${question.options}" class="option-row">
                        <label th:for="'q' + ${iter.index} + 'o' + ${optIter.index}">
                            <input type="radio" th:name="|answers[${iter.index}]|" th:value="${optIter.index}"
                                   th:id="'q' + ${iter.index} + 'o' + ${optIter.index}" required>
                            <span th:text="${option}"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="quiz-footer" style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 30px;">
                <button type="button" id="prev-btn" class="btn btn-secondary" style="padding: 12px 24px; border-radius: 10px; font-weight: 600;">Previous</button>
                <button type="button" id="next-btn" class="btn btn-primary" style="padding: 12px 24px; border-radius: 10px; font-weight: 600;">Next</button>
                <button type="submit" id="submit-btn" class="btn btn-success" style="padding: 12px 24px; border-radius: 10px; font-weight: 700;">Submit Quiz</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
