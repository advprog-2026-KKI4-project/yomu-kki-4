<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Yomu - Quiz Session</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <script th:src="@{/js/quiz-timer.js}" defer></script>
    <style>
        .quiz-top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; gap: 12px; flex-wrap: wrap; }
        .discussion-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 50px;
            background: var(--bg-card);
            border: 1px solid var(--border-soft);
            transition: color 0.15s, border-color 0.15s;
        }
        .discussion-link:hover { color: var(--primary-purple); border-color: var(--primary-purple); }
        .quiz-title { font-size: 24px; font-weight: 800; text-align: center; margin-bottom: 32px; color: var(--text-heading); letter-spacing: -0.3px; }
        .question-block { margin-bottom: 32px; }
        .question-block > p { font-weight: 700; margin-bottom: 16px; color: var(--text-heading); font-size: 16px; }
        .quiz-footer { display: flex; justify-content: center; margin-top: 32px; }
        .quiz-footer .btn { width: auto; padding: 13px 44px; font-size: 15px; }
    </style>
</head>
<body class="focused-view">
<main class="quiz-focus-container">
    <header class="quiz-top-bar">
        <a th:href="@{|/discussion/${material.id}|}" target="_blank" rel="noopener" class="discussion-link">
            <i class="fas fa-comments"></i> View discussion
        </a>
        <div class="timer-badge">
            <i class="far fa-clock"></i> <span id="timer-display">0:00</span>
        </div>
    </header>

    <div class="content-box">
        <form id="quiz-form" th:action="@{/api/materials/{id}/submit(id=${material.id})}" method="post">
            <input type="hidden" id="time-limit" th:value="${material.timeLimit}">
            <input type="hidden" id="duration-input" name="duration" value="0">

            <h1 class="quiz-title" th:text="'Quiz: ' + ${material.title}">Quiz: Title</h1>

            <div class="question-block" th:each="question, iter : ${material.questions}">
                <p th:text="(${iter.index} + 1) + '. ' + ${question.questionText}"></p>

                <div class="options-stack">
                    <div th:each="option, optIter : ${question.options}" class="option-row">
                        <label th:for="'q' + ${iter.index} + 'o' + ${optIter.index}">
                            <input type="radio" th:name="|answers[${iter.index}]|" th:value="${optIter.index}"
                                   th:id="'q' + ${iter.index} + 'o' + ${optIter.index}" required>
                            <span th:text="${option}"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="quiz-footer">
                <button type="submit" class="btn btn-primary">Submit Answers</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
