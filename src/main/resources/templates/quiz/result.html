<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Yomu - Results</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <h1 class="logo">YOMU</h1>
        <nav>
            <a th:href="@{/reading}" class="nav-item active"><i class="fas fa-th-large"></i> Dashboard</a>
            <a th:href="@{/my-learning}" class="nav-item"><i class="fas fa-book-open"></i> My Learning</a>
            <a href="#" class="nav-item"><i class="fas fa-users"></i> Clan</a>
            <a href="#" class="nav-item"><i class="fas fa-trophy"></i> Rank</a>
        </nav>
    </aside>

    <main class="main-content" style="display: flex; align-items: center; justify-content: center;">
        <div class="result-card" style="margin-top: 0;">
            <div class="result-icon">🎉</div>
            <h1 th:if="${score >= 80}">Excellent!</h1>
            <h1 th:if="${score < 80 and score >= 50}">Good Effort!</h1>
            <h1 th:if="${score < 50}">Keep Practicing!</h1>
            <p class="subtitle">You have successfully completed the quiz.</p>

            <div class="stats-container">
                <div class="stat-item">
                    <span class="stat-label">Total Score</span>
                    <div class="stat-value" th:text="${#numbers.formatDecimal(score, 1, 1)}">0.0</div>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Time Spent</span>
                    <div class="stat-value" th:text="${duration} + 's'">0s</div>
                </div>
            </div>

            <div class="score-breakdown">
                <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                    <span style="color: #666; font-weight: 600;">Quiz Accuracy:</span>
                    <span style="font-weight: 800; color: var(--primary-purple);" th:text="${#numbers.formatDecimal(baseScore, 1, 0)}">0</span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span style="color: #666; font-weight: 600;">Speed Bonus:</span>
                    <span style="color: var(--completed-green); font-weight: 800;" th:text="'+' + ${#numbers.formatDecimal(bonus, 1, 1)}">+0.0</span>
                </div>
            </div>

            <div style="margin-top: 30px;">
                <a th:href="@{/reading}" class="btn btn-primary">Back to Dashboard</a>
            </div>
        </div>
    </main>
</div>
</body>
</html>
