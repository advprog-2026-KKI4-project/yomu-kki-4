<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Yomu - Clan List Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Available Clans</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createClanModal">Create New Clan</button>
    </div>

    <div class="row">
        <div class="col-md-4 mb-4" th:each="clan : ${clans}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title text-primary" th:text="${clan.name}">Clan Name</h5>
                    <h6 class="card-subtitle mb-2 text-muted" th:text="${clan.division}">BRONZE</h6>
                    <p class="card-text" th:text="${clan.bio}">Clan description goes here.</p>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="badge bg-info text-dark">Score: <span th:text="${clan.totalScore}">0</span></span>
                        <button class="btn btn-outline-success btn-sm">Request to Join</button>
                    </div>
                </div>
                <div class="card-footer text-muted small">
                    Leader ID: <span th:text="${clan.leaderId}">Unknown</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
