<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/components :: head('Yomu - Leaderboard')}"></th:block>
    <style>
        /* --- VARIABLES --- */
        :root {
            --theme-purple: #5e35b1;
            --theme-purple-light: #e5def5;
            --clan-row-border: #b39ddb;
            --clan-row-hover: #e0d9f0;
        }

        /* --- MAIN CONTENT & LAYOUT --- */
        .main-card {
            background-color: white;
            border-radius: 25px;
            min-height: 93vh;
            padding: 30px;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }

        .page-title {
            color: var(--primary-purple);
            font-weight: 700;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        /* --- TABS --- */
        .tabs-wrapper {
            text-align: center;
            margin-bottom: 3rem;
        }

        .tab-container {
            background-color: var(--theme-purple-light);
            border-radius: 50px;
            padding: 5px;
            display: inline-flex;
        }

        .tab-btn {
            background-color: transparent;
            color: var(--primary-purple);
            border-radius: 50px;
            border: none;
            padding: 8px 30px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .tab-btn:hover {
            color: var(--theme-purple);
        }

        .tab-btn.active {
            background-color: var(--primary-purple);
            color: white;
        }

        /* --- CLAN ROW COMPONENTS --- */
        .clan-row {
            background-color: var(--theme-purple-light);
            border-radius: 20px;
            margin-bottom: 15px;
            padding: 15px;
            border-left: 8px solid var(--clan-row-border);
            transition: transform 0.2s, background-color 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .clan-row:hover {
            transform: scale(1.01);
            background-color: var(--clan-row-hover);
        }

        .clan-info {
            display: flex;
            align-items: center;
            flex-grow: 1;
        }

        .rank-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-purple);
            width: 40px;
        }

        .clan-icon {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--primary-purple);
            margin-right: 1rem;
        }

        .division-badge {
            font-size: 0.6em;
            margin-left: 0.25rem;
        }

        .view-btn {
            border: 2px solid var(--primary-purple);
            color: var(--primary-purple);
            border-radius: 10px;
            font-weight: bold;
            background: white;
        }

        .view-btn:hover {
            background-color: var(--primary-purple);
            color: white;
        }

        /* --- MODAL COMPONENTS --- */
        .modal-content {
            border-radius: 25px;
            border: none;
            box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.175);
        }

        .modal-clan-header {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .profile-circle {
            width: 80px;
            height: 80px;
            background-color: #e0e0e0;
            border-radius: 50%;
            border: 3px solid var(--primary-purple);
            margin-right: 1rem;
        }

        .stat-card {
            padding: 0.5rem;
            border: 1px solid #dee2e6;
            border-radius: 1rem;
            background-color: #f8f9fa;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }

        .stat-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #6c757d;
            display: block;
        }

        .members-container {
            padding: 1rem;
            border: 1px solid #dee2e6;
            border-radius: 1rem;
            background-color: white;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
<div class="container-fluid row p-0 m-0">
    <th:block th:replace="~{fragments/components :: sidebar('/leaderboard')}"></th:block>

    <main class="main-content">
        <div class="main-card">
            <h2 class="page-title">Leaderboard</h2>

            <div class="tabs-wrapper">
                <div class="tab-container">
                    <a th:href="@{/leaderboard(tab='global')}" class="tab-btn"
                        th:classappend="${activeTab == 'global'} ? 'active' : ''">
                        Global
                    </a>

                    <a th:href="@{/leaderboard(tab='division')}" class="tab-btn"
                        th:classappend="${activeTab == 'division'} ? 'active' : ''">
                        My Division
                    </a>
                </div>
            </div>

            <div id="leaderboard-list" class="px-lg-5">

                <!-- Clan Row -->
                <div th:each="clan, iterStat : ${clans}" class="clan-row"
                     data-bs-toggle="modal"
                     th:data-bs-target="|#modal-${clan.id}|">

                    <div class="clan-info">
                        <div class="rank-number" th:text="${iterStat.count}">1</div>
                        <div class="clan-icon">
                            <i class="fas fa-shield text-primary fs-4"></i>
                        </div>
                        <div class="flex-grow-1">
                            <h5 class="mb-0 fw-bold">
                                <span th:text="${clan.name}">Clan Name</span>
                                <span class="badge rounded-pill bg-secondary division-badge" th:text="${clan.division}">BRONZE</span>
                            </h5>
                            <small class="text-muted">
                                <i class="fas fa-trophy text-warning"></i>
                                <span th:text="${#numbers.formatInteger(clan.totalScore, 0, 'COMMA')}">0</span> trophies |
                                <i class="fas fa-users"></i>
                                <span th:text="${#lists.size(clan.members.?[status == 'ACCEPTED'])} + '/20'">0/20</span>
                            </small>
                        </div>
                        <button class="btn view-btn">Details <i class="fas fa-eye ms-1"></i></button>
                    </div>
                </div>

                <!-- Empty State -->
                <div th:if="${clans.isEmpty()}" class="text-center py-5">
                    <p class="text-muted">No clans found this season.</p>
                </div>
            </div>
        </div>

        <!-- Modals -->
        <div th:each="clan : ${clans}" class="modal fade" th:id="|modal-${clan.id}|" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-centered text-dark">
                <div class="modal-content">
                    <div class="modal-body p-4">
                        <div class="d-flex justify-content-end">
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>

                        <div class="modal-clan-header">
                            <div class="profile-circle"></div>
                            <div>
                                <h3 class="mb-0 fw-bold" th:text="${clan.name}">Clan Name</h3>
                                <span class="badge rounded-pill bg-warning text-dark" th:text="${clan.division}">GOLD</span>
                                <p class="text-muted mb-0 mt-1" th:text="${clan.bio}">Bio...</p>
                            </div>
                        </div>

                        <div class="row g-3 mb-4 text-center">
                            <div class="col-6">
                                <div class="stat-card">
                                    <small class="stat-label">Multiplier</small>
                                    <h5 class="fw-bold text-primary mb-0" th:text="${clan.activeMultiplier} + 'x'">1.0x</h5>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="stat-card">
                                    <small class="stat-label">Score</small>
                                    <h5 class="fw-bold text-success mb-0" th:text="${clan.totalScore}">0</h5>
                                </div>
                            </div>
                        </div>

                        <div class="members-container">
                            <h6 class="fw-bold mb-3">Members (<span th:text="${#lists.size(clan.members.?[status == 'ACCEPTED'])}"></span>/20)</h6>
                            <table class="table table-sm table-hover align-middle">
                                <tbody>
                                    <tr th:each="member : ${clan.members}" th:if="${member.status == 'ACCEPTED'}">
                                        <td>
                                            <i class="fas fa-user me-2 text-muted"></i>
                                            <span th:text="${member.student != null ? member.student.username : member.studentId}"></span>
                                        </td>
                                        <td class="text-end">
                                            <span class="badge bg-light text-dark border" th:text="${member.role}"></span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<th:block th:replace="~{fragments/components :: scripts}"></th:block>
</body>
</html>
