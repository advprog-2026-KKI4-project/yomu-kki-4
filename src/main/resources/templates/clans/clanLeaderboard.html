<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Yomu - Leaderboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #fce4d6; font-family: 'Segoe UI', sans-serif; }
        .sidebar { background-color: #fce4d6; min-height: 100vh; padding: 20px; }
        .sidebar-btn { border: none; background: transparent; padding: 10px; width: 100%; text-align: left; color: #7b61ff; font-weight: 600; margin-bottom: 10px; }
        .sidebar-btn.active { background-color: #ffffff; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        .main-card { background-color: white; border-radius: 25px; min-height: 90vh; margin: 20px; padding: 30px; }
        .tab-container { background-color: #d1c4e9; border-radius: 50px; padding: 5px; display: inline-flex; }
        .tab-btn { border-radius: 50px; border: none; padding: 8px 30px; font-weight: bold; transition: all 0.3s ease; }
        .tab-btn.active { background-color: #5e35b1; color: white; }

        .clan-row { background-color: #ede7f6; border-radius: 20px; margin-bottom: 15px; padding: 15px; border-left: 8px solid #b39ddb; transition: transform 0.2s; cursor: pointer; }
        .clan-row:hover { transform: scale(1.01); background-color: #e5def5; }
        .rank-number { font-size: 1.5rem; font-weight: 800; color: #5e35b1; width: 40px; }
        .clan-icon { width: 50px; height: 50px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #5e35b1; }
        .view-btn { border: 2px solid #5e35b1; color: #5e35b1; border-radius: 10px; font-weight: bold; background: white; }

        .profile-circle { width: 80px; height: 80px; background-color: #e0e0e0; border-radius: 50%; border: 3px solid #5e35b1; }
        .modal-content { border-radius: 25px; border: none; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar d-none d-md-block">
            <a th:href="@{/clans/my-clan(studentId=${param.studentId})}" class="sidebar-btn d-block text-decoration-none">
                <i class="bi bi-shield"></i> My Clan
            </a>
            <a th:href="@{/clans/discover(studentId=${param.studentId})}" class="sidebar-btn d-block text-decoration-none">
                <i class="bi bi-search"></i> Discover
            </a>
            <a th:href="@{/leaderboard(studentId=${param.studentId})}" class="sidebar-btn active d-block text-decoration-none">
                <i class="bi bi-trophy"></i> Leaderboard
            </a>
        </div>

        <div class="col-md-10">
            <div class="main-card shadow">
                <h1 class="text-center mb-4" style="color: #ffb74d; font-weight: 800;">Leaderboard</h1>

                <div class="text-center mb-5">
                    <div class="tab-container">
                        <button id="btn-global" class="tab-btn active" onclick="switchLeaderboard('global')">Global</button>
                        <button id="btn-division" class="tab-btn" style="background: transparent; color: #5e35b1;" onclick="switchLeaderboard('division')">Division</button>
                    </div>
                </div>

                <div id="leaderboard-list" class="clan-list px-lg-5">
                    <div th:each="clan, iterStat : ${clans}" class="clan-row d-flex align-items-center"
                         data-bs-toggle="modal"
                         th:data-bs-target="|#modal-${clan.id}|">
                        <div class="d-flex align-items-center flex-grow-1">
                            <div class="rank-number" th:text="${iterStat.count}">1</div>
                            <div class="clan-icon me-3">
                                <i class="bi bi-shield-shaded text-primary"></i>
                            </div>
                            <div class="flex-grow-1">
                                <h5 class="mb-0 fw-bold">
                                    <span th:text="${clan.name}">Clan Name</span>
                                    <span class="badge rounded-pill bg-secondary ms-1" style="font-size: 0.6em;" th:text="${clan.division}">BRONZE</span>
                                </h5>
                                <small class="text-muted">
                                    <i class="bi bi-trophy-fill text-warning"></i>
                                    <span th:text="${#numbers.formatInteger(clan.totalScore, 0, 'COMMA')}">0</span> trophies |
                                    <i class="bi bi-people-fill"></i>
                                    <span th:text="${#lists.size(clan.members.?[status == 'ACCEPTED'])} + '/20'">0/20</span>
                                </small>
                            </div>
                            <button class="btn view-btn">Details <i class="bi bi-eye"></i></button>
                        </div>
                    </div>

                    <div th:if="${clans.isEmpty()}" class="text-center py-5">
                        <p class="text-muted">No clans found this season.</p>
                    </div>
                </div>
            </div>

            <div th:each="clan : ${clans}" class="modal fade" th:id="|modal-${clan.id}|" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-lg modal-dialog-centered text-dark">
                    <div class="modal-content shadow-lg">
                        <div class="modal-body p-4">
                            <div class="d-flex justify-content-end">
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>

                            <div class="d-flex align-items-center mb-4">
                                <div class="profile-circle me-3"></div>
                                <div>
                                    <h2 class="mb-0 fw-bold" th:text="${clan.name}">Clan Name</h2>
                                    <span class="badge rounded-pill bg-warning text-dark" th:text="${clan.division}">GOLD</span>
                                    <p class="text-muted mb-0 mt-1" th:text="${clan.bio}">Bio...</p>
                                </div>
                            </div>

                            <div class="row g-3 mb-4 text-center">
                                <div class="col-6">
                                    <div class="p-2 border rounded-4 bg-light shadow-sm">
                                        <small class="text-muted d-block fw-bold text-uppercase" style="font-size: 0.7rem;">Multiplier</small>
                                        <h5 class="fw-bold text-primary mb-0" th:text="${clan.activeMultiplier} + 'x'">1.0x</h5>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="p-2 border rounded-4 bg-light shadow-sm">
                                        <small class="text-muted d-block fw-bold text-uppercase" style="font-size: 0.7rem;">Score</small>
                                        <h5 class="fw-bold text-success mb-0" th:text="${clan.totalScore}">0</h5>
                                    </div>
                                </div>
                            </div>

                            <div class="p-3 border rounded-4 bg-white shadow-sm">
                                <h6 class="fw-bold mb-3">Members (<span th:text="${#lists.size(clan.members.?[status == 'ACCEPTED'])}"></span>/20)</h6>
                                <table class="table table-sm table-hover align-middle">
                                    <tbody>
                                    <tr th:each="member : ${clan.members}" th:if="${member.status == 'ACCEPTED'}">
                                        <td><i class="bi bi-person me-1"></i> <span th:text="${member.studentId}"></span></td>
                                        <td class="text-end"><span class="badge bg-light text-dark border" th:text="${member.role}"></span></td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function switchLeaderboard(scope) {
        const globalBtn = document.getElementById('btn-global');
        const divisionBtn = document.getElementById('btn-division');

        if (scope === 'global') {
            globalBtn.classList.add('active');
            globalBtn.style.background = "#5e35b1";
            globalBtn.style.color = "white";
            divisionBtn.classList.remove('active');
            divisionBtn.style.background = "transparent";
            divisionBtn.style.color = "#5e35b1";
        } else {
            divisionBtn.classList.add('active');
            divisionBtn.style.background = "#5e35b1";
            divisionBtn.style.color = "white";
            globalBtn.classList.remove('active');
            globalBtn.style.background = "transparent";
            globalBtn.style.color = "#5e35b1";
        }

        const url = scope === 'global' ? '/api/leaderboard/global' : '/api/leaderboard/division/bronze';

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('Network response error');
            const clans = await response.json();
            renderLeaderboard(clans);
        } catch (error) {
            console.error("Failed to load:", error);
        }
    }

    function renderLeaderboard(clans) {
        const listContainer = document.getElementById('leaderboard-list');
        listContainer.innerHTML = '';

        if (!clans || clans.length === 0) {
            listContainer.innerHTML = '<div class="text-center py-5"><p class="text-muted">No clans found.</p></div>';
            return;
        }

        clans.forEach((clan, index) => {
            const acceptedCount = clan.members
                ? clan.members.filter(m => m.status === 'ACCEPTED').length
                : 0;

            const row = `
                <div class="clan-row d-flex align-items-center" data-bs-toggle="modal" data-bs-target="#modal-${clan.id}">
                    <div class="rank-number">${index + 1}</div>
                    <div class="clan-icon me-3"><i class="bi bi-shield-shaded text-primary"></i></div>
                    <div class="flex-grow-1">
                        <h5 class="mb-0 fw-bold">
                            ${clan.name}
                            <span class="badge rounded-pill bg-secondary" style="font-size: 0.6em;">${clan.division}</span>
                        </h5>
                        <small class="text-muted">
                            <i class="bi bi-trophy-fill text-warning"></i> ${clan.totalScore.toLocaleString()} trophies |
                            <i class="bi bi-people-fill"></i> ${acceptedCount}/20
                        </small>
                    </div>
                    <button class="btn view-btn">Details <i class="bi bi-eye"></i></button>
                </div>
            `;
            listContainer.innerHTML += row;
        });
    }
</script>
</body>
</html>
