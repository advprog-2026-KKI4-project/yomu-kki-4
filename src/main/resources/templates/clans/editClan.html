<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <th:block th:replace="~{fragments/components :: head('Yomu - Edit Clan')}"></th:block>

    <style>
        /* --- MAIN CONTENT & LAYOUT --- */
        .main-card {
            background-color: white;
            border-radius: 25px;
            height: 93vh;
            padding: 30px;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .page-title {
            color: var(--primary-purple);
            font-weight: 700;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        /* --- EDIT CLAN SPECIFIC STYLES --- */
        .creation-container {
            max-width: 650px;
            margin: 0 auto;
            padding: 0 30px;
        }

        /* --- FORM COMPONENTS --- */
        .form-label {
            font-weight: 700;
            color: var(--primary-purple);
            margin-bottom: 8px;
        }

        .custom-input {
            border-radius: 12px;
            padding: 12px 15px;
            border: 1px solid #dee2e6;
            background-color: #f8f9fa;
            transition: all 0.3s ease;
        }

        .custom-input:focus {
            background-color: #ffffff;
            border-color: var(--primary-purple);
            box-shadow: 0 0 0 4px var(--theme-purple-light, #e5def5);
            outline: none;
        }

        .custom-textarea {
            min-height: 150px;
            resize: none;
        }

        .profile-upload-area {
            width: 120px;
            height: 120px;
            background-color: #f8f9fa;
            border: 2px dashed #dee2e6;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #adb5bd;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .profile-upload-area:hover {
            border-color: var(--primary-purple);
            color: var(--primary-purple);
            background-color: var(--active-bg);
        }

        .btn-edit-clan {
            background-color: var(--button-bg-orange, #f3a683);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 8px;
            font-weight: 700;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .btn-edit-clan:hover {
            background-color: var(--button-bg-orange-hover, #fd8a48);
            transform: translateY(-2px);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container-fluid row p-0 m-0">
        <th:block th:replace="~{fragments/components :: sidebar('/clans/my-clan')}"></th:block>

        <main class="main-content">
            <div class="main-card">
                <div class="text-center mb-5">
                    <h2 class="page-title">Edit Clan</h2>
                    <p class="text-muted">Start your journey as a Leader today.</p>
                </div>

                <div class="creation-container w-100">
                    <form th:action="@{/clans/update}" method="POST">
                        <input type="hidden" name="clanId" th:value="${clan.id}">

                        <div class="mb-4">
                            <label class="form-label">Clan Name</label>
                            <input type="text" name="name" class="form-control custom-input" th:value="${clan.name}"
                                required maxlength="30">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Description</label>
                            <textarea name="bio" class="form-control custom-input custom-textarea" th:text="${clan.bio}"
                                required maxlength="255"></textarea>
                        </div>

                        <button type="submit" class="btn-edit-clan">
                            Save Changes
                        </button>
                    </form>
                </div>

                <div class="text-center mt-4">
                    <a th:href="@{/clans/my-clan}"
                        class="text-muted small text-decoration-none fw-bold">
                        <i class="fas fa-arrow-left me-1"></i> Nevermind, take me back
                    </a>
                </div>
            </div>
        </main>
    </div>

    <th:block th:replace="~{fragments/components :: scripts}"></th:block>
</body>
</html>
