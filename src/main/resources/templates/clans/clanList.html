<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <th:block th:replace="~{fragments/components :: head('Yomu - Discover Clans')}"></th:block>

    <style>
        :root {
            --theme-purple: #5e35b1;
            --theme-purple-light: #e5def5;
            --clan-row-border: #b39ddb;
            --clan-row-hover: #e0d9f0;
        }

        .main-card {
            background-color: white;
            border-radius: 25px;
            min-height: 93vh;
            padding: 30px;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }

        .page-title {
            color: var(--primary-purple);
            font-weight: 700;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto 40px;
            position: relative;
        }

        .search-input {
            border-radius: 50px;
            padding: 12px 25px;
            border: 2px solid var(--clan-row-border, #d1c4e9);
            width: 100%;
            outline: none;
            transition: 0.3s;
        }

        .search-input:focus {
            border-color: var(--primary-purple);
            box-shadow: 0 0 10px rgba(94, 53, 177, 0.2);
        }

        .search-icon {
            position: absolute;
            right: 25px;
            top: 15px;
            color: var(--primary-purple);
            font-size: 1.2rem;
        }

        .clan-row {
            background-color: var(--theme-purple-light);
            border-radius: 20px;
            margin-bottom: 15px;
            padding: 15px;
            border-left: 8px solid var(--clan-row-border);
            transition: transform 0.2s, background-color 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .clan-row:hover {
            transform: scale(1.01);
            background-color: var(--clan-row-hover);
        }

        .clan-info {
            display: flex;
            align-items: center;
            flex-grow: 1;
        }

        .clan-icon {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--primary-purple);
            margin-right: 1rem;
        }

        .division-badge {
            font-size: 0.6em;
            margin-left: 0.25rem;
        }

        .view-btn {
            border: 2px solid var(--primary-purple);
            color: var(--primary-purple);
            border-radius: 10px;
            font-weight: bold;
            background: white;
        }

        .view-btn:hover {
            background-color: var(--primary-purple);
            color: white;
        }

        .modal-content {
            border-radius: 25px;
            border: none;
            box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.175);
        }

        .modal-clan-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .profile-group {
            display: flex;
            align-items: center;
        }

        .profile-circle {
            width: 80px;
            height: 80px;
            background-color: #e0e0e0;
            border-radius: 50%;
            border: 3px solid var(--primary-purple);
            margin-right: 1rem;
        }

        .stat-card {
            padding: 0.5rem;
            border: 1px solid #dee2e6;
            border-radius: 1rem;
            background-color: #f8f9fa;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }

        .stat-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #6c757d;
            display: block;
        }

        .members-container {
            padding: 1rem;
            border: 1px solid #dee2e6;
            border-radius: 1rem;
            background-color: white;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
    </style>
</head>
<body>
<div class="container-fluid row p-0 m-0">
    <th:block th:replace="~{fragments/components :: sidebar('/clans/discover')}"></th:block>

    <main class="main-content">
        <div class="main-card">
            <h2 class="page-title">Discover Clans</h2>

            <div th:if="${!myInvitations.isEmpty()}" class="alert alert-info shadow-sm mb-4 mx-lg-5" style="border-radius: 15px;">
                <h5 class="fw-bold mb-3"><i class="fas fa-envelope-open-text me-2"></i> Clan Invitations</h5>
                <div class="list-group">
                    <div th:each="invite : ${myInvitations}" class="list-group-item d-flex justify-content-between align-items-center border-0 rounded bg-white shadow-sm mb-2">
                        <div>
                            <strong th:text="${invite.clan.name}" class="fs-5">Clan Name</strong>
                            <span class="badge bg-warning text-dark ms-2" th:text="${invite.clan.division}">GOLD</span>
                        </div>
                        <div>
                            <button th:data-clan-id="${invite.clan.id}"
                                    onclick="handleInvitation(this.getAttribute('data-clan-id'), 'accept-invitation')"
                                    class="btn btn-sm btn-success rounded-pill px-3 fw-bold me-1">
                                Accept
                            </button>
                            <button th:data-clan-id="${invite.clan.id}"
                                    onclick="handleInvitation(this.getAttribute('data-clan-id'), 'decline')"
                                    class="btn btn-sm btn-outline-danger rounded-pill px-3 fw-bold">
                                Decline
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="search-container">
                <input type="text" id="clanSearch" class="search-input" placeholder="Search for a clan..." onkeyup="filterClans()">
                <i class="fas fa-search search-icon"></i>
            </div>

            <div id="clan-list-container" class="px-lg-5">
                <div th:each="clan : ${clans}" class="clan-row" data-bs-toggle="modal"
                    th:data-bs-target="|#modal-${clan.id}|">
                    <div class="clan-info">
                        <div class="clan-icon">
                            <i class="fas fa-shield-alt text-primary fs-4"></i>
                        </div>
                        <div>
                            <h5 class="mb-0 fw-bold">
                                <span th:text="${clan.name}">Clan Name</span>
                                <span class="badge rounded-pill bg-secondary division-badge"
                                      th:text="${clan.division}">BRONZE</span>
                            </h5>
                            <small class="text-muted">
                                <i class="fas fa-users me-1"></i> <span
                                    th:text="${#lists.size(clan.members.?[status == 'ACCEPTED'])} + '/20'">0/20</span>
                                Members |
                                <span th:text="${clan.bio}">Small bio...</span>
                            </small>
                        </div>
                    </div>
                    <button class="btn view-btn">Details <i class="fas fa-eye ms-1"></i></button>
                </div>

                <div th:if="${clans.isEmpty()}" class="text-center py-5">
                    <p class="text-muted">No clans available to discover.</p>
                </div>
            </div>
        </div>

        <div th:each="clan : ${clans}" class="modal fade" th:id="|modal-${clan.id}|" tabindex="-1"
            aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-body p-4">
                        <div class="d-flex justify-content-end">
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>

                        <div class="modal-clan-header">
                            <div class="profile-group">
                                <div class="profile-circle"></div>
                                <div>
                                    <h2 class="mb-0 fw-bold text-dark" th:text="${clan.name}">Clan Name</h2>
                                    <span class="badge rounded-pill bg-warning text-dark"
                                        th:text="${clan.division}">GOLD</span>
                                    <p class="text-muted mb-0 mt-1" th:text="${clan.bio}">Bio goes here...</p>
                                </div>
                            </div>

                            <div th:if="${!hasClan}">
                                <button th:if="${#lists.contains(pendingClanIds, clan.id)}" type="button"
                                    class="btn btn-success rounded-pill px-5 fw-bold shadow-sm" disabled>
                                    <i class="fas fa-check"></i> Request Sent
                                </button>

                                <button th:unless="${#lists.contains(pendingClanIds, clan.id)}" type="button"
                                    th:id="|request-btn-${clan.id}|"
                                    class="btn btn-primary rounded-pill px-5 fw-bold shadow"
                                    th:data-clan-id="${clan.id}"
                                    onclick="sendJoinRequest(this)">
                                    Request to Join
                                </button>
                            </div>
                        </div>

                        <div class="row g-3 mb-4 text-center text-dark">
                            <div class="col-4">
                                <div class="stat-card">
                                    <small class="stat-label">Multiplier</small>
                                    <h5 class="fw-bold text-primary mb-0" th:text="${clan.activeMultiplier} + 'x'">
                                        1.0x</h5>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="stat-card">
                                    <small class="stat-label">Score</small>
                                    <h5 class="fw-bold text-success mb-0" th:text="${clan.totalScore}">0</h5>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="stat-card">
                                    <small class="stat-label">Global Rank</small>
                                    <h5 class="fw-bold text-dark mb-0"
                                        th:text="'#' + ${clan.previousRank != null ? clan.previousRank : '??'}">#1
                                    </h5>
                                </div>
                            </div>
                        </div>

                        <div class="members-container text-dark">
                            <h6 class="fw-bold mb-3">Members (<span
                                    th:text="${#lists.size(clan.members.?[status == 'ACCEPTED'])}"></span>/20)</h6>
                            <table class="table table-sm table-hover align-middle">
                                <tbody>
                                <tr th:each="member : ${clan.members}" th:if="${member.status == 'ACCEPTED'}">
                                    <td><i class="fas fa-user me-2 text-muted"></i>
                                        <span th:text="${member.student != null ? member.student.username : member.studentId}"></span>
                                    </td>
                                    <td class="text-end"><span class="badge bg-light text-dark border"
                                                               th:text="${member.role}"></span></td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<th:block th:replace="~{fragments/components :: scripts}"></th:block>
<script>
    function filterClans() {
        let input = document.getElementById('clanSearch').value.toLowerCase();
        let rows = document.getElementsByClassName('clan-row');
        for (let row of rows) {
            let name = row.querySelector('h5').innerText.toLowerCase();
            row.style.display = name.includes(input) ? "flex" : "none";
        }
    }

    async function sendJoinRequest(buttonElement) {
        const clanId = buttonElement.getAttribute('data-clan-id');

        buttonElement.disabled = true;
        buttonElement.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Sending...';

        try {
            const response = await fetch(`/api/clans/${clanId}/request`, { method: 'POST' });
            if (response.ok) {
                buttonElement.innerHTML = '<i class="fas fa-check"></i> Request Sent';
                buttonElement.className = "btn btn-success rounded-pill px-5 fw-bold shadow-sm";
            } else {
                throw new Error('Error');
            }
        } catch (error) {
            alert("Failed to send request. You might already have a pending request.");
            buttonElement.disabled = false;
            buttonElement.innerHTML = 'Request to Join';
        }
    }

    async function handleInvitation(clanId, action) {
        try {
            const response = await fetch(`/api/clans/${clanId}/${action}`, { method: 'POST' });
            if (response.ok) {
                window.location.href = action === 'accept-invitation' ? '/clans/my-clan' : '/clans/discover';
            } else {
                alert("Failed to process invitation.");
            }
        } catch (error) {
            alert("A network error occurred.");
        }
    }
</script>
</body>
</html>
