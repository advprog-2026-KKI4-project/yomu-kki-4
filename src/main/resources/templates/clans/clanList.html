<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Yomu - Discover Clans</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #fce4d6; font-family: 'Segoe UI', sans-serif; }
        .sidebar { background-color: #fce4d6; min-height: 100vh; padding: 20px; }
        .sidebar-btn { border: none; background: transparent; padding: 10px; width: 100%; text-align: left; color: #7b61ff; font-weight: 600; margin-bottom: 10px; }
        .sidebar-btn.active { background-color: #ffffff; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .main-card { background-color: white; border-radius: 25px; min-height: 90vh; margin: 20px; padding: 30px; }

        /* Search Bar Style */
        .search-container { max-width: 500px; margin: 0 auto 30px; position: relative; }
        .search-input { border-radius: 50px; padding: 10px 25px; border: 1px solid #ddd; width: 100%; }
        .search-icon { position: absolute; right: 20px; top: 12px; color: #aaa; }

        /* List Style */
        .discover-list-container { background-color: #9d8df1; border-radius: 20px; padding: 20px; }
        .clan-item { background-color: #e0e0e0; border-radius: 50px; padding: 10px 25px; margin-bottom: 15px; cursor: pointer; transition: 0.2s; border: none; width: 100%; text-align: left; }
        .clan-item:hover { background-color: #d0d0d0; transform: scale(1.01); }
        .clan-avatar { width: 50px; height: 50px; background: white; border-radius: 50%; display: inline-block; vertical-align: middle; margin-right: 15px; }

        /* Modal Custom Style (Similar to My Clan) */
        .modal-content { border-radius: 25px; border: none; background-color: #9d8df1; color: white; }
        .info-box { background-color: #e2e2e2; border-radius: 10px; padding: 15px; color: #333; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar d-none d-md-block">
            <button class="sidebar-btn"><i class="bi bi-shield"></i> My Clan</button>
            <button class="sidebar-btn active"><i class="bi bi-search"></i> Discover</button>
            <button class="sidebar-btn"><i class="bi bi-trophy"></i> Leaderboard</button>
        </div>

        <div class="col-md-10">
            <div class="main-card shadow text-center">
                <h1 class="mb-4" style="color: #ffb74d; font-weight: 800; font-size: 3rem;">Discover Clans</h1>

                <div class="search-container shadow-sm">
                    <input type="text" id="clanSearch" class="search-input" placeholder="Search Clan Name" onkeyup="filterClans()">
                    <i class="bi bi-search search-icon"></i>
                </div>

                <div class="discover-list-container shadow">
                    <div id="clanList">
                        <button th:each="clan : ${clans}"
                                class="clan-item d-flex align-items-center justify-content-between"
                                data-bs-toggle="modal"
                                th:data-bs-target="'#modal-' + ${clan.id}">
                            <div class="d-flex align-items-center">
                                <i class="bi bi-star-fill text-white me-3" style="font-size: 1.5rem;"></i>
                                <div class="clan-avatar"></div>
                                <h4 class="mb-0 fw-bold text-dark" th:text="${clan.name}">Clan Name</h4>
                            </div>
                            <div class="bg-white rounded-pill px-4 py-2 text-primary fw-bold">View</div>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:each="clan : ${clans}" class="modal fade" th:id="'modal-' + ${clan.id}" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-4 shadow-lg">
            <div class="modal-header border-0">
                <h3 class="modal-title fw-bold" th:text="${clan.name}">Clan Detail</h3>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="fw-bold">Description</label>
                    <div class="info-box" th:text="${clan.bio}">Bio goes here...</div>
                </div>
                <div class="row mb-3 text-center">
                    <div class="col-6">
                        <label class="fw-bold">Division</label>
                        <div class="info-box" th:text="${clan.division}">BRONZE</div>
                    </div>
                    <div class="col-6">
                        <label class="fw-bold">Members</label>
                        <div class="info-box" th:text="${clan.members.size()} + '/20'">5/20</div>
                    </div>
                </div>

                <div class="mt-4 text-center">
                    <form th:if="${!hasClan}" th:action="@{/api/clans/join}" method="POST">
                        <input type="hidden" name="clanId" th:value="${clan.id}">
                        <button type="submit" class="btn btn-light rounded-pill px-5 fw-bold text-primary shadow">
                            Request to Join
                        </button>
                    </form>
                    <p th:unless="${!hasClan}" class="text-white-50 small italic">
                        You are already a member of a clan.
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function filterClans() {
        let input = document.getElementById('clanSearch').value.toLowerCase();
        let items = document.getElementsByClassName('clan-item');
        for (let i = 0; i < items.length; i++) {
            let name = items[i].getElementsByTagName('h4').innerText.toLowerCase();
            items[i].style.display = name.includes(input) ? "flex" : "none";
        }
    }
</script>

</body>
</html>
