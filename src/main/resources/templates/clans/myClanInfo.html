<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Yomu - My Clan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #fce4d6;
            font-family: 'Segoe UI',
            sans-serif;
        }
        .sidebar {
            background-color: #fce4d6;
            min-height: 100vh;
            padding: 20px;
        }
        .sidebar-btn {
            border: none;
            background: transparent;
            padding: 10px; width: 100%;
            text-align: left;
            color: #7b61ff;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .sidebar-btn.active {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .main-card {
            background-color:
            white; border-radius: 25px;
            min-height: 90vh;
            margin: 20px;
            padding: 30px;
        }

        .clan-header-card {
            background-color: #a096e0;
            border-radius: 20px;
            padding: 30px;
            color: white;
            position: relative;
        }
        .profile-circle {
            width: 100px;
            height: 100px;
            background-color: #e0e0e0;
            border-radius: 50%;
            border: 4px solid white;
        }
        .info-box {
            background-color: #e2e2e2;
            border-radius: 10px;
            padding: 15px; min-height:
            80px; color: #333;
            margin-top: 5px;
        }
        .label-text {
            font-weight: bold;
            color: white;
            font-size: 1.1rem;
        }

        .empty-state-text {
            color: #ffb74d;
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.2;
        }
        .btn-action {
            background-color: #a096e0;
            color: white;
            border-radius: 30px;
            padding: 12px 30px;
            border: none;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-action:hover {
            background-color: #7b61ff;
            transform: translateY(-2px);
            color: white;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar d-none d-md-block">
            <a th:href="@{/clans/my-clan(studentId=${param.studentId})}" class="sidebar-btn active d-block text-decoration-none">
                <i class="bi bi-shield"></i> My Clan
            </a>
            <a th:href="@{/clans/discover(studentId=${param.studentId})}" class="sidebar-btn d-block text-decoration-none">
                <i class="bi bi-search"></i> Discover
            </a>
            <a th:href="@{/leaderboard}" class="sidebar-btn d-block text-decoration-none">
                <i class="bi bi-trophy"></i> Leaderboard
            </a>
        </div>

        <div class="col-md-10">
            <div class="main-card shadow text-center d-flex align-items-center justify-content-center">
                <div th:if="${!hasClan}" class="container">
                    <h1 class="empty-state-text mb-5">You don't have <br> clan yet :(</h1>
                    <div class="d-flex justify-content-center gap-3">
                        <a th:href="@{/clans/discover(studentId=${param.studentId})}" class="btn-action shadow text-decoration-none">
                            Join Existing Clan
                        </a>
                        <a th:href="@{/clans/create-form(studentId=${param.studentId})}" class="btn-action shadow text-decoration-none">
                            Make My Own
                        </a>
                    </div>
                </div>

                <div th:unless="${!hasClan}" class="container text-start">
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <div class="d-flex align-items-center">
                            <div class="profile-circle me-3"></div>
                            <div>
                                <h2 class="mb-0 fw-bold" th:text="${clan.name}">Clan Name</h2>
                                <span class="badge rounded-pill bg-warning text-dark" th:text="${clan.division}">GOLD</span>
                                <p class="text-muted mb-0 mt-1" th:text="${clan.bio}">Clan Bio goes here...</p>
                            </div>
                        </div>

                        <div class="text-end">
                            <form th:if="${myRole == 'LEADER'}" th:action="@{/clans/delete(studentId=${param.studentId})}" method="POST" onsubmit="return confirm('Are you sure you want to delete this clan?')">
                                <input type="hidden" name="clanId" th:value="${clan.id}">
                                <button type="submit" class="btn btn-danger btn-sm px-3 shadow-sm">
                                    <i class="bi bi-trash"></i> Delete Clan
                                </button>
                            </form>
                            <form th:unless="${myRole == 'LEADER'}" th:action="@{/clans/leave(studentId=${param.studentId})}" method="POST">
                                <button type="submit" class="btn btn-outline-danger btn-sm px-3 shadow-sm">
                                    <i class="bi bi-box-arrow-right"></i> Leave Clan
                                </button>
                            </form>
                        </div>
                    </div>

                    <div class="row g-3 mb-4 text-center">
                        <div class="col-md-4">
                            <div class="p-3 border rounded-4 bg-light shadow-sm">
                                <small class="text-muted d-block fw-bold text-uppercase">Multiplier</small>
                                <h4 class="fw-bold text-primary mb-0" th:text="${clan.activeMultiplier} + 'x'">1.0x</h4>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="p-3 border rounded-4 bg-light shadow-sm">
                                <small class="text-muted d-block fw-bold text-uppercase">Total Points</small>
                                <h4 class="fw-bold text-success mb-0" th:text="${#numbers.formatInteger(clan.totalScore, 0, 'COMMA')}">0</h4>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="p-3 border rounded-4 bg-light shadow-sm">
                                <small class="text-muted d-block fw-bold text-uppercase">Rank</small>
                                <div class="d-flex justify-content-center gap-2 mt-1">
                                    <span class="badge bg-dark">Global #<span th:text="${clan.previousRank != null ? clan.previousRank : '??'}">12</span></span>
                                    <span class="badge bg-info text-dark">Div #1</span> </div>
                            </div>
                        </div>
                    </div>

                    <div class="p-4 border rounded-4 bg-white shadow-sm">
                        <div class="d-flex justify-content-between mb-3 align-items-center">
                            <h5 class="fw-bold mb-0"><i class="bi bi-people-fill me-2"></i>Clan Members</h5>
                            <div class="d-flex gap-2">
                                <button th:if="${myRole == 'LEADER'}" class="btn btn-primary btn-sm rounded-pill px-3" data-bs-toggle="modal" data-bs-target="#inviteModal">
                                    <i class="bi bi-plus-lg"></i> Invite
                                </button>
                                <span class="badge bg-secondary p-2" th:text="${clan.members.size()} + '/20'">5/20</span>
                            </div>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                <tr>
                                    <th>Member Name</th>
                                    <th>Role</th>
                                    <th class="text-end">Contribution</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="member : ${clan.members}">
                                    <td class="fw-semibold">
                                        <i class="bi bi-person-circle me-2"></i>
                                        <span th:text="${member.studentId}">Student ID</span>
                                    </td>
                                    <td>
                            <span class="badge rounded-pill"
                                  th:classappend="${member.role == 'LEADER' ? 'bg-primary' : 'bg-light text-dark border'}"
                                  th:text="${member.role}">MEMBER</span>
                                    </td>
                                    <td class="text-end fw-bold text-success" th:text="${#numbers.formatInteger(member.localScore, 0, 'COMMA')} + ' pts'">0 pts</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
