<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{fragments/components :: head('Yomu - My-Clan')}"></th:block>
    <style>
        /* --- VARIABLES --- */
        :root {
            --button-bg-orange: #f3a683;
            --button-bg-orange-hover: #fd8a48;
        }

        /* --- MAIN CONTENT & CONTAINERS --- */
        .main-card {
            background-color: white;
            border-radius: 25px;
            min-height: 93vh;
            padding: 30px;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- CLAN COMPONENTS --- */
        .clan-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .clan-profile-group {
            display: flex;
            align-items: center;
        }

        .profile-circle {
            width: 100px;
            height: 100px;
            background-color: #e0e0e0;
            border-radius: 50%;
            border: 4px solid white;
            margin-right: 1rem;
        }

        .clan-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.5rem;
        }

        .stat-card {
            padding: 1rem;
            border: 1px solid #dee2e6;
            border-radius: 1rem;
            background-color: #f8f9fa;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            height: 100%;
        }

        .members-container {
            padding: 1.5rem;
            border: 1px solid #dee2e6;
            border-radius: 1rem;
            background-color: white;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }

        .members-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        /* --- CUSTOM TYPOGRAPHY & BUTTONS --- */
        .empty-state-text {
            color: var(--primary-purple);
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 3rem;
        }

        .btn-action {
            background-color: var(--button-bg-orange);
            color: white;
            border-radius: 30px;
            padding: 12px 30px;
            border: none;
            font-weight: 600;
            transition: 0.3s;
            display: inline-block;
            text-decoration: none;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }

        .btn-action:hover {
            background-color: var(--button-bg-orange-hover);
            transform: translateY(-2px);
            color: white;
        }
    </style>
</head>
<body>

<div class="container-fluid row p-0 m-0">
    <th:block th:replace="~{fragments/components :: sidebar('/clans/my-clan')}"></th:block>

    <div class="main-content">
        <div class="main-card text-center">

            <!-- Empty State -->
            <div th:if="${!hasClan}" class="container">
                <h2 class="empty-state-text">You don't have <br> clan yet :(</h2>
                <div class="d-flex justify-content-center gap-3">
                    <a th:href="@{/clans/discover}" class="btn-action">Join Existing Clan</a>
                    <a th:href="@{/clans/create-form}" class="btn-action">Make My Own</a>
                </div>
            </div>

            <!-- Active Clan State -->
            <div th:unless="${!hasClan}" class="container text-start w-100">

                <!-- Header Section -->
                <div class="clan-header">
                    <div class="clan-profile-group">
                        <div class="profile-circle"></div>
                        <div>
                            <h2 class="mb-0 fw-bold" th:text="${clan.name}">Clan Name</h2>
                            <span class="badge rounded-pill bg-warning text-dark" th:text="${clan.division}">GOLD</span>
                            <p class="text-muted mb-0 mt-1" th:text="${clan.bio}">Clan Bio goes here...</p>
                        </div>
                    </div>

                    <div class="text-end">
                        <div th:if="${myRole == 'LEADER'}" class="clan-actions">
                            <a th:href="@{/clans/{id}/edit-form(id=${clan.id}, studentId=${param.studentId})}"
                               class="btn btn-outline-secondary btn-sm px-3 shadow-sm w-100">
                                <i class="fas fa-pen-to-square me-1"></i> Edit Clan
                            </a>

                            <form th:action="@{/clans/delete}" method="POST" class="w-100" onsubmit="return confirm('Are you sure you want to delete this clan?')">
                                <input type="hidden" name="clanId" th:value="${clan.id}">
                                <button type="submit" class="btn btn-danger btn-sm px-3 shadow-sm w-100">
                                    <i class="fas fa-trash me-1"></i> Delete Clan
                                </button>
                            </form>
                        </div>

                        <form th:unless="${myRole == 'LEADER'}" th:action="@{/clans/leave}" method="POST">
                            <button type="submit" class="btn btn-outline-danger btn-sm px-3 shadow-sm">
                                <i class="fas fa-sign-out-alt"></i> Leave Clan
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Stats Section -->
                <div class="row g-3 mb-4 text-center">
                    <div class="col-md-4">
                        <div class="stat-card">
                            <small class="text-muted d-block fw-bold text-uppercase">Multiplier</small>
                            <h4 class="fw-bold text-primary mb-0" th:text="${clan.activeMultiplier} + 'x'">1.0x</h4>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stat-card">
                            <small class="text-muted d-block fw-bold text-uppercase">Total Points</small>
                            <h4 class="fw-bold text-success mb-0" th:text="${#numbers.formatInteger(clan.totalScore, 0, 'COMMA')}">0</h4>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stat-card">
                            <small class="text-muted d-block fw-bold text-uppercase">Rank</small>
                            <div class="d-flex justify-content-center gap-2 mt-1">
                                <span class="badge bg-dark">Global #<span th:text="${clan.previousRank != null ? clan.previousRank : '??'}">12</span></span>
                                <span class="badge bg-info text-dark">Div #1</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Members Section -->
                <div class="members-container">
                    <div class="members-header">
                        <h5 class="fw-bold mb-0">
                            <i class="fas fa-user-friends me-2"></i>Clan Members
                        </h5>
                        <div class="d-flex gap-2">
                            <button th:if="${myRole == 'LEADER'}" class="btn btn-primary btn-sm rounded-pill px-3" data-bs-toggle="modal" data-bs-target="#inviteModal">
                                <i class="fas fa-plus"></i> Invite
                            </button>
                            <span class="badge bg-secondary p-2" th:text="${clan.members.size()} + '/20'">5/20</span>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>Member Name</th>
                                <th>Role</th>
                                <th class="text-end">Contribution</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="member : ${clan.members}">
                                <td class="fw-semibold">
                                    <i class="fas fa-user-circle me-2 text-muted"></i>
                                    <span th:text="${member.studentId}">Student ID</span>
                                </td>
                                <td>
                                    <span class="badge rounded-pill"
                                          th:classappend="${member.role == 'LEADER' ? 'bg-primary' : 'bg-light text-dark border'}"
                                          th:text="${member.role}">MEMBER</span>
                                </td>
                                <td class="text-end fw-bold text-success"
                                    th:text="${#numbers.formatInteger(member.localScore, 0, 'COMMA')} + ' pts'">0 pts
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/components :: scripts}"></th:block>
</body>
</html>
