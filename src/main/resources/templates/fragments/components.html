<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- 1. HEAD FRAGMENT -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <title th:text="${title}">Yomu</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-lavender: #f8f2f9;
            --primary-purple: #5b4b8a;
            --active-bg: #efeaf3;
            --sidebar-white: #ffffff;
        }

        body {
            background-color: var(--bg-lavender);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        .sidebar {
            width: 250px;
            background: var(--sidebar-white);
            height: 100vh;
            position: fixed;
            padding: 30px 0;
            z-index: 100;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 40px;
            line-height: normal;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 15px 30px;
            color: var(--primary-purple);
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            gap: 15px;
            transition: 0.2s;
            line-height: normal;
        }

        .nav-item.active {
            background: var(--active-bg);
            border-left: 5px solid var(--primary-purple);
        }

        .nav-item i {
            width: 25px;
            text-align: center;
        }

        .main-content {
            margin-left: 250px;
            flex: 1;
            padding: 20px 50px;
            min-height: 100vh;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 15px 0;
            }
        }
    </style>
</head>

<body>
<!-- 2. SIDEBAR FRAGMENT -->
<aside th:fragment="sidebar(currentUri)" class="sidebar">
    <h1 class="logo">YOMU</h1>
    <nav>
        <a th:href="@{/reading}" class="nav-item" th:classappend="${currentUri == '/reading' ? 'active' : ''}">
            <i class="fas fa-th-large"></i> Dashboard
        </a>
        <a th:href="@{/my-learning}" class="nav-item" th:classappend="${currentUri == '/my-learning' ? 'active' : ''}">
            <i class="fas fa-book-open"></i> My Learning
        </a>
        <a th:href="@{/clans/my-clan}" class="nav-item" th:classappend="${currentUri == '/clans/my-clan' ? 'active' : ''}">
            <i class="fas fa-shield"></i> My Clan
        </a>
        <a th:href="@{/clans/discover}" class="nav-item" th:classappend="${currentUri == '/clans/discover' ? 'active' : ''}">
            <i class="fas fa-search"></i> Discover Clans
        </a>
        <a th:href="@{/leaderboard}" class="nav-item" th:classappend="${currentUri == '/leaderboard' ? 'active' : ''}">
            <i class="fas fa-trophy"></i> Leaderboard
        </a>
    </nav>
</aside>

<!-- 3. SCRIPTS FRAGMENT -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</div>
</body>
</html>
