<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Yomu - Reader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .logout-link { margin-top: auto; padding: 12px 18px; color: var(--danger); font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 12px; border-radius: 12px; transition: background 0.15s; background: none; border: none; cursor: pointer; text-align: left; width: 100%; font-family: inherit; }
        .logout-link:hover { background: #ffebee; }
        .reader-toolbar { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .review-section { margin-top: 40px; border-top: 1px solid var(--border-soft); padding-top: 32px; }
        .result-banner { text-align: center; margin-bottom: 32px; }
        .result-banner h2 { color: var(--text-heading); font-weight: 800; font-size: 22px; margin-bottom: 8px; }
        .review-item { margin-bottom: 20px; padding: 22px; border-radius: 14px; border: 1px solid var(--border-soft); background: var(--bg-card); }
        .review-item p.question-text { font-weight: 700; margin-bottom: 14px; font-size: 15px; color: var(--text-heading); }
        .option-review-box { padding: 12px 16px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; font-size: 14px; }
        .option-correct { background: #e8f5e9; border: 1px solid #4caf50; color: #1b5e20; }
        .option-wrong { background: #ffebee; border: 1px solid #f44336; color: #b71c1c; }
        .option-neutral { background: var(--bg-subtle); color: var(--text-muted); border: 1px solid var(--border-soft); }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <h1 class="logo">YOMU</h1>
        <nav>
            <a th:href="@{/dashboard}" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
            <a th:href="@{/reading}" class="nav-item" th:classappend="${currentUri == '/reading' ? 'active' : ''}"><i class="fas fa-book-open"></i> Learning</a>
            <a th:href="@{/my-learning}" class="nav-item" th:classappend="${currentUri == '/my-learning' ? 'active' : ''}"><i class="fas fa-bookmark"></i> My Learning</a>
            <a th:href="@{/achievements}" class="nav-item"><i class="fas fa-trophy"></i> Achievements</a>
            <a th:href="@{/daily-missions}" class="nav-item"><i class="fas fa-bullseye"></i> Missions</a>
            <a th:href="@{/clans/my-clan}" class="nav-item"><i class="fas fa-users"></i> Clan</a>
            <a th:href="@{/leaderboard}" class="nav-item"><i class="fas fa-medal"></i> Leaderboard</a>
            <a th:href="@{/discussions}" class="nav-item"><i class="fas fa-comments"></i> Discussions</a>
        </nav>
        <form th:action="@{/logout}" method="post" style="margin-top: auto; padding: 0 4px;">
            <button type="submit" class="logout-link"><i class="fas fa-sign-out-alt"></i> Log Out</button>
        </form>
    </aside>

    <main class="main-content">
        <div class="reader-toolbar">
            <a th:href="@{/reading}" class="back-link"><i class="fas fa-arrow-left"></i> Back to Library</a>
            <a th:if="${material != null}" th:href="@{/discussion/{id}(id=${material.id})}" class="btn btn-secondary btn-icon"><i class="fas fa-comments"></i> Discuss this material</a>
        </div>

        <div th:if="${material == null}">
            <div class="content-box" style="text-align: center; padding: 60px;">
                <h2 style="color: var(--text-heading); font-weight: 800;">Material not found.</h2>
                <a th:href="@{/reading}" class="btn btn-primary btn-icon" style="margin-top: 20px;">Back to Library</a>
            </div>
        </div>

        <section th:if="${material != null}" class="reader-view">
            <div class="reader-header">
                <span class="category-tag" th:text="${material.category}">Category</span>
                <h1 class="reader-title" th:text="${material.title}">Material Title</h1>
            </div>

            <div class="content-box">
                <p class="reading-text" th:text="${material.content}">Content goes here...</p>

                <div th:if="${isReview}" class="review-section">
                    <div class="result-banner">
                        <h2>Quiz Results</h2>
                        <div class="score-display"><span th:text="${#numbers.formatDecimal(score, 1, 1)}">0.0</span></div>
                    </div>
                    <h3 style="margin-bottom: 20px; color: var(--text-heading); font-weight: 800;">Review Answers</h3>
                    <div th:each="question, qIter : ${material.questions}" class="review-item">
                        <p class="question-text" th:text="${qIter.count} + '. ' + ${question.questionText}"></p>
                        <div class="options-review">
                            <div th:each="option, oIter : ${question.options}"
                                 class="option-review-box"
                                 th:classappend="${oIter.index == question.correctOptionIndex ? 'option-correct' :
                                               (attempt != null && oIter.index == attempt.answers[qIter.index] ? 'option-wrong' : 'option-neutral')}">
                                <span th:text="${option}">Option</span>
                                <span th:if="${oIter.index == question.correctOptionIndex}" style="font-weight: 800;">✔ Correct</span>
                                <span th:if="${attempt != null && oIter.index == attempt.answers[qIter.index] && oIter.index != question.correctOptionIndex}" style="font-weight: 800;">✖ Your Choice</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div th:if="${!isReview}" class="reader-actions">
                    <a th:href="@{/quiz/{id}(id=${material.id})}" class="btn btn-primary">Start Quiz</a>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
