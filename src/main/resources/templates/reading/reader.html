<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Yomu - Reader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <h1 class="logo">YOMU</h1>
        <nav>
            <a th:href="@{/dashboard(role=${role})}" class="nav-item" th:classappend="${currentUri == '/dashboard' ? 'active' : ''}">
                <i class="fas fa-th-large"></i> Dashboard
            </a>
            <a th:href="@{/my-learning(role=${role})}" class="nav-item" th:classappend="${currentUri == '/my-learning' ? 'active' : ''}">
                <i class="fas fa-book-open"></i> Course
            </a>
            <a href="#" class="nav-item"><i class="fas fa-users"></i> Clan</a>
            <a href="#" class="nav-item"><i class="fas fa-search"></i> Discover</a>
            <a href="#" class="nav-item"><i class="fas fa-trophy"></i> Leaderboard</a>
            <a href="#" class="nav-item logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="canvas-container">
            <div style="margin-bottom: 35px;">
                <a th:href="@{/dashboard(role=${role})}" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
            </div>

            <div th:if="${material == null}" style="text-align: center; padding: 50px 0;">
                <h2 style="color: #564b8f;">Module not found.</h2>
            </div>

            <section th:if="${material != null}">
                <div style="margin-bottom: 35px;">
                    <span class="category-tag" th:text="${material.category}"></span>
                    <h1 style="color: #111016; font-size: 36px; font-weight: 800; margin-top: 12px;" th:text="${material.title}"></h1>
                </div>

                <div style="font-size: 16px; line-height: 1.8; color: #333; white-space: pre-wrap; margin-bottom: 50px;" th:text="${material.content}"></div>

                <div th:if="${isReview || role == 'ADMIN'}" style="border-top: 2px dashed #ede6ec; padding-top: 40px; margin-top: 40px;">
                    <div th:if="${isReview}" style="text-align: center; margin-bottom: 45px;">
                        <h2 style="color: #564b8f; font-weight: 800; font-size: 24px;">Quiz Performance Metrics</h2>
                        <div style="font-size: 56px; font-weight: 800; color: #6b5ce0; margin-top: 10px;" th:text="${#numbers.formatDecimal(score, 1, 1)}"></div>
                    </div>

                    <h3 style="color: #111016; font-weight: 700; margin-bottom: 25px; font-size: 18px;" th:text="${role == 'ADMIN' ? 'Quiz Configurations Overview' : 'Evaluation Review'}"></h3>
                    <div th:each="question, qIter : ${material.questions}" style="background: #faf6fa; border: 1px solid #f2edf1; padding: 25px; border-radius: 20px; margin-bottom: 20px;">
                        <p style="font-weight: 700; font-size: 16px; margin-bottom: 15px; color: #111016;" th:text="${qIter.count} + '. ' + ${question.questionText}"></p>
                        <div style="display: flex; flex-direction: column; gap: 10px;">
                            <div th:each="option, oIter : ${question.options}" style="padding: 14px 20px; border-radius: 12px; display: flex; justify-content: space-between; font-weight: 600; font-size: 14px;"
                                 th:styleappend="${oIter.index == question.correctOptionIndex ? 'background: #e8f5e9; border: 1px solid #27ae60; color: #1b5e20;' : (attempt != null && attempt.answers != null && attempt.answers.size() > qIter.index && oIter.index == attempt.answers[qIter.index] ? 'background: #ffebee; border: 1px solid #ff5252; color: #b71c1c;' : 'background: #ffffff; border: 1px solid #ede6ec; color: #7f8fa4;')}">
                                <span th:text="${option}"></span>
                                <span th:if="${oIter.index == question.correctOptionIndex}">✔ Correct answer key</span>
                                <span th:if="${attempt != null && attempt.answers != null && attempt.answers.size() > qIter.index && oIter.index == attempt.answers[qIter.index] && oIter.index != question.correctOptionIndex}">✖ Your selection input</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div th:if="${!isReview && role == 'STUDENT'}" style="display: flex; justify-content: center; margin-top: 40px; border-top: 1px solid #ede6ec; padding-top: 30px;">
                    <a th:href="@{/quiz/{id}(id=${material.id}, role=${role})}" class="btn btn-primary" style="padding: 16px 80px; font-size: 16px; border-radius: 14px;">Start Quiz !</a>
                </div>
            </section>
        </div>
    </main>
</div>
</body>
</html>
