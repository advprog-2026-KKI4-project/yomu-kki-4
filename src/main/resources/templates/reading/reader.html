<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Yomu - Reader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <h1 class="logo">YOMU</h1>
        <nav>
            <a th:href="@{/reading}" class="nav-item active"><i class="fas fa-th-large"></i> Dashboard</a>
            <a th:href="@{/my-learning}" class="nav-item"><i class="fas fa-book-open"></i> My Learning</a>
            <a href="#" class="nav-item"><i class="fas fa-users"></i> Clan</a>
            <a href="#" class="nav-item"><i class="fas fa-trophy"></i> Rank</a>
        </nav>
    </aside>

    <main class="main-content">
        <div style="margin-bottom: 30px; display:flex; justify-content:space-between; align-items:center;">
            <a th:href="@{/reading}" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
            <a th:if="${material != null}" th:href="@{/discussion/{id}(id=${material.id})}" class="btn btn-secondary"><i class="fas fa-comments"></i> Discuss this material</a>
        </div>

        <div th:if="${material == null}">
            <div class="content-box" style="text-align: center; padding: 60px;">
                <h2 style="color: var(--primary-purple);">Material not found.</h2>
                <a th:href="@{/reading}" class="btn btn-primary" style="margin-top: 20px;">Back to Dashboard</a>
            </div>
        </div>

        <section th:if="${material != null}" class="reader-view">
            <div class="reader-header">
                <span class="category-tag" th:text="${material.category}">Category</span>
                <h1 class="reader-title" th:text="${material.title}">Material Title</h1>
            </div>

            <div class="content-box">
                <p class="reading-text" th:text="${material.content}">Content goes here...</p>

                <div th:if="${isReview}" class="review-section" style="margin-top: 50px; border-top: 2px dashed #eee; padding-top: 40px;">
                    <div class="result-banner" style="text-align: center; margin-bottom: 40px;">
                        <h2 style="color: var(--primary-purple);">Quiz Results</h2>
                        <div class="score-display">
                            <span th:text="${#numbers.formatDecimal(score, 1, 1)}">0.0</span>
                        </div>
                    </div>

                    <h3 style="margin-bottom: 20px;">Review Answers</h3>
                    <div th:each="question, qIter : ${material.questions}" class="review-item"
                         style="margin-bottom: 25px; padding: 20px; border-radius: 15px; border: 1px solid #eee;">

                        <p style="font-weight: 700; margin-bottom: 15px;" th:text="${qIter.count} + '. ' + ${question.questionText}"></p>

                        <div class="options-review">
                            <div th:each="option, oIter : ${question.options}"
                                 class="option-review-box"
                                 style="padding: 10px 15px; border-radius: 8px; margin-bottom: 5px; display: flex; justify-content: space-between;"
                                 th:styleappend="${oIter.index == question.correctOptionIndex ? 'background: #e8f5e9; border: 1px solid #4caf50; color: #1b5e20;' :
                                               (attempt != null && oIter.index == attempt.answers[qIter.index] ? 'background: #ffebee; border: 1px solid #f44336; color: #b71c1c;' : 'background: #f9f9f9; color: #666;')}">

                                <span th:text="${option}">Option</span>
                                <span th:if="${oIter.index == question.correctOptionIndex}" style="font-weight: 800;">✔ Correct</span>
                                <span th:if="${attempt != null && oIter.index == attempt.answers[qIter.index] && oIter.index != question.correctOptionIndex}" style="font-weight: 800;">✖ Your Choice</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div th:if="${!isReview}" class="reader-actions">
                    <a th:href="@{/quiz/{id}(id=${material.id})}" class="btn btn-primary">Start Quiz !</a>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
