<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Yomu - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <script th:src="@{/js/dashboard.js}" defer></script>
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <h1 class="logo">YOMU</h1>
        <nav>
            <a th:href="@{/reading}" class="nav-item" th:classappend="${currentUri == '/reading' ? 'active' : ''}">
                <i class="fas fa-th-large"></i> Dashboard
            </a>
            <a th:href="@{/my-learning(role=${role})}" class="nav-item" th:classappend="${currentUri == '/my-learning' ? 'active' : ''}">
                <i class="fas fa-book-open"></i> Course
            </a>
            <a href="#" class="nav-item"><i class="fas fa-users"></i> Clan</a>
            <a href="#" class="nav-item"><i class="fas fa-search"></i> Discover</a>
            <a href="#" class="nav-item"><i class="fas fa-trophy"></i> Leaderboard</a>
            <a href="#" class="nav-item logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="canvas-container">
            <header class="header">
                <div class="welcome-msg">
                    <h2 th:text="'Welcome, ' + ${username} + '!'"></h2>
                    <span th:if="${role == 'ADMIN'}" class="admin-role">Admin Workspace</span>
                </div>
                <div class="header-right">
                    <i class="fas fa-bell notification-icon"></i>
                    <div class="user-profile">
                        <div class="profile-pic" style="background-image: url('https://via.placeholder.com/45')"></div>
                    </div>
                    <div th:if="${role == 'ADMIN'}" style="margin-left: 10px;">
                        <a th:href="@{/admin/create}" class="btn btn-primary">+ Create New Module</a>
                    </div>
                </div>
            </header>

            <div class="search-bar-container">
                <input type="text" id="materialSearch" placeholder="Search module name or category..." class="search-input">
            </div>

            <section class="module-list">
                <div class="module-item" th:each="material : ${materials}">
                    <div style="display: flex; align-items: center; gap: 20px; flex: 1;">
                        <div class="cat-icon-container">
                            <i th:if="${material.category == 'Code'}" class="fas fa-code"></i>
                            <i th:if="${material.category == 'Basketball' || material.category == 'Sport'}" class="fas fa-basketball-ball"></i>
                            <i th:if="${material.category != 'Code' && material.category != 'Basketball' && material.category != 'Sport'}" class="fas fa-book"></i>
                        </div>
                        <div class="module-info">
                            <h3 class="module-title" th:text="${material.title}"></h3>
                            <div th:if="${role == 'STUDENT'}" class="status-row">
                                <span>Progress</span>
                                <div class="progress-bar-bg">
                                    <div class="progress-bar-fill" th:style="'width: ' + ${material.progress} + '%'"></div>
                                </div>
                                <span class="percentage-text" th:text="${material.progress} + '%'"></span>
                            </div>
                        </div>
                    </div>

                    <div class="module-actions" th:if="${role == 'STUDENT'}">
                        <a th:if="${material.progress == 0}" th:href="@{/reading/{id}(id=${material.id}, role=${role})}" class="btn btn-primary">Start Reading</a>
                        <a th:if="${material.progress == 50}" th:href="@{/reading/{id}(id=${material.id}, role=${role})}" class="btn btn-primary">Start Quiz</a>
                        <a th:if="${material.progress == 100}" th:href="@{/review/{id}(id=${material.id}, role=${role})}" class="btn btn-completed">Completed</a>
                    </div>

                    <div class="module-actions" th:if="${role == 'ADMIN'}">
                        <a th:href="@{/reading/{id}(id=${material.id}, role='ADMIN')}" class="btn-icon-only"><i class="fas fa-eye"></i></a>
                        <a th:href="@{/admin/edit/{id}(id=${material.id})}" class="btn-icon-only"><i class="fas fa-pencil-alt"></i></a>
                        <form th:action="@{/api/admin/materials/delete/{id}(id=${material.id})}" method="post" style="display:inline">
                            <input type="hidden" name="role" value="ADMIN">
                            <button type="submit" class="btn-icon-only btn-danger" onclick="return confirm('Delete this module?')"><i class="fas fa-trash-alt"></i></button>
                        </form>
                    </div>
                </div>
            </section>
        </div>
    </main>
</div>
</body>
</html>
