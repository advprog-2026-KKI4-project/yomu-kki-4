<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Yomu - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="app-container">

    <aside class="sidebar">
        <h1 class="logo">YOMU</h1>
        <nav>
            <a th:href="@{/reading}" class="nav-item" th:classappend="${currentUri == '/reading' ? 'active' : ''}">
                <i class="fas fa-th-large"></i> Dashboard
            </a>
            <a th:href="@{/my-learning}" class="nav-item" th:classappend="${currentUri == '/my-learning' ? 'active' : ''}">
                <i class="fas fa-book-open"></i> My Learning
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-users"></i> Clan
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-trophy"></i> Rank
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="user-profile">
                <i class="fas fa-user-circle"></i>
                <h2 th:text="'Welcome, ' + ${username} + '!'">Welcome, Username!</h2>
            </div>
            <div th:if="${role == 'ADMIN'}">
                <a th:href="@{/admin/create}" class="btn btn-primary add-btn">+ Add Material</a>
            </div>
        </header>

        <div class="search-bar-container">
            <input type="text" id="materialSearch" placeholder="Search title or category..." class="search-input">
        </div>

        <section class="card-grid" id="cardGrid">
            <div class="card" th:each="material : ${materials}">
                <div class="card-top">
                    <span class="category-tag" th:text="${material.category}">Code</span>
                    <h3 class="material-title" th:text="${material.title}">Programming Foundation 1</h3>
                </div>

                <div class="progress-area">
                    <span class="progress-percent" th:text="${material.progress} + '%'">0%</span>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" th:style="'width: ' + ${material.progress} + '%'"></div>
                    </div>
                </div>

                <div class="card-footer">
                    <div th:if="${role == 'STUDENT'}">
                        <a th:if="${material.progress == 0}" th:href="@{/reading/{id}(id=${material.id})}" class="btn btn-primary">Start Reading !</a>
                        <a th:if="${material.progress == 50}" th:href="@{/quiz/{id}(id=${material.id})}" class="btn btn-primary">Start Quiz !</a>
                        <a th:if="${material.progress == 100}" th:href="@{/review/{id}(id=${material.id})}" class="btn btn-completed">Completed !</a>
                    </div>

                    <div th:if="${role == 'ADMIN'}" class="admin-actions">
                        <a th:href="@{/admin/edit/{id}(id=${material.id})}" class="btn btn-secondary">Edit</a>
                        <form th:action="@{/api/admin/materials/delete/{id}(id=${material.id})}" method="post" style="flex:1">
                            <button type="submit" class="btn btn-danger" onclick="return confirm('Delete?')">Delete</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>

<script>
    document.getElementById('materialSearch').addEventListener('input', function() {
        const query = this.value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
            const title = card.querySelector('.material-title').innerText.toLowerCase();
            const cat = card.querySelector('.category-tag').innerText.toLowerCase();
            card.style.display = (title.includes(query) || cat.includes(query)) ? 'flex' : 'none';
        });
    });
</script>
</body>
</html>
