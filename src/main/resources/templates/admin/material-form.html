<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Yomu - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .logout-link {
            margin-top: auto;
            padding: 12px 18px;
            color: var(--danger);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 12px;
            transition: background 0.15s;
            background: none;
            border: none;
            cursor: pointer;
            text-align: left;
            width: 100%;
            font-family: inherit;
        }
        .logout-link:hover { background: #ffebee; }

        .form-container {
            max-width: 760px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-soft);
        }
        .form-container h1 {
            color: var(--text-heading);
            font-weight: 800;
            margin-bottom: 28px;
            font-size: 26px;
            letter-spacing: -0.3px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-heading);
            font-size: 14px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-input);
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            background: var(--bg-card);
            color: var(--text-primary);
            transition: border-color 0.15s, box-shadow 0.15s;
            outline: none;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: var(--primary-purple);
            box-shadow: 0 0 0 3px rgba(91, 75, 138, 0.08);
        }
        .question-editor {
            background: var(--bg-subtle);
            padding: 22px;
            border-radius: 14px;
            border: 1px dashed var(--border-input);
            margin-top: 20px;
        }
        .option-input {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;
            width: 100%;
        }
        .option-input input[type="text"] {
            flex: 1;
            width: 100%;
        }
        .option-input input[type="radio"] {
            width: auto;
            accent-color: var(--primary-purple);
            transform: scale(1.2);
            margin: 0;
        }
        .section-divider { margin: 36px 0 24px; border: 0; border-top: 1px solid var(--border-soft); }
        .section-heading { color: var(--text-heading); font-weight: 800; font-size: 18px; margin-bottom: 16px; }
        .save-btn { margin-top: 32px; width: auto; padding: 13px 44px; font-size: 15px; }
        .add-btn {
            background: var(--bg-card);
            border: 1px solid var(--primary-purple);
            color: var(--primary-purple);
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.15s;
        }
        .add-btn:hover {
            background: rgba(91, 75, 138, 0.05);
        }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <h1 class="logo">YOMU</h1>
        <nav>
            <a th:href="@{/dashboard}" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
            <a th:href="@{/reading}" class="nav-item" th:classappend="${currentUri == '/reading' ? 'active' : ''}"><i class="fas fa-book-open"></i> Learning</a>
            <a th:href="@{/my-learning}" class="nav-item" th:classappend="${currentUri == '/my-learning' ? 'active' : ''}"><i class="fas fa-bookmark"></i> My Learning</a>
            <a th:href="@{/achievements/progress}" class="nav-item"><i class="fas fa-trophy"></i> Achievements</a>
            <a th:href="@{/daily-missions}" class="nav-item"><i class="fas fa-bullseye"></i> Missions</a>
            <a th:href="@{/clans/my-clan}" class="nav-item"><i class="fas fa-users"></i> Clan</a>
            <a th:href="@{/leaderboard}" class="nav-item"><i class="fas fa-medal"></i> Leaderboard</a>
            <a th:href="@{/discussions}" class="nav-item"><i class="fas fa-comments"></i> Discussions</a>
            <a th:href="@{/profile}" class="nav-item"><i class="fas fa-user"></i> Profile</a>
            </nav>
        <form th:action="@{/logout}" method="post" style="margin-top: auto; padding: 0 4px;">
            <button type="submit" class="logout-link"><i class="fas fa-sign-out-alt"></i> Log Out</button>
        </form>
    </aside>

    <main class="main-content">
        <div class="form-container">
            <div style="margin-bottom: 24px;">
                <a th:href="@{/reading}" class="back-link"><i class="fas fa-arrow-left"></i> Cancel and Exit</a>
            </div>

            <h1 th:text="${material.id == null ? 'Create New Material' : 'Edit Material'}"></h1>

            <form th:action="${material.id == null} ? @{/api/admin/materials/add} : @{/api/admin/materials/edit/{id}(id=${material.id})}" th:object="${material}" method="post">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" th:field="*{title}" placeholder="e.g., Basic Java" required>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <input type="text" th:field="*{category}" placeholder="e.g., Code, Sport, Art" required>
                </div>

                <div class="form-group">
                    <label>Reading Content</label>
                    <textarea th:field="*{content}" rows="8" placeholder="Type the learning material here..." required></textarea>
                </div>

                <hr class="section-divider">

                <h2 class="section-heading">Quiz Settings</h2>

                <div class="form-group">
                    <label>Time Limit (Seconds)</label>
                    <input type="number" th:field="*{timeLimit}" min="10" required>
                </div>

                <div id="questions-container">
                    <div th:if="${material.questions != null}" th:each="question, qIter : ${material.questions}" class="question-editor" th:data-index="${qIter.index}">
                        <div class="form-group">
                            <label th:text="'Question ' + (${qIter.index} + 1) + ' Text'"></label>
                            <input type="text" th:name="'questions[' + ${qIter.index} + '].questionText'" th:value="${question.questionText}" placeholder="Type question core string..." required>
                        </div>
                        <div class="form-group">
                            <label>Options (Check the radio for the correct answer)</label>
                            <div class="option-input" th:each="i : ${#numbers.sequence(0, 3)}">
                                <input type="radio" th:name="'questions[' + ${qIter.index} + '].correctOptionIndex'" th:value="${i}" th:checked="${question.correctOptionIndex == i}" required>
                                <input type="text" th:name="'questions[' + ${qIter.index} + '].options[' + ${i} + ']'" th:value="${question.options != null && question.options.size() > i ? question.options.get(i) : ''}" placeholder="Option text..." required>
                            </div>
                        </div>
                    </div>

                    <div th:if="${material.questions == null || material.questions.isEmpty()}" class="question-editor" data-index="0">
                        <div class="form-group">
                            <label>Question 1 Text</label>
                            <input type="text" name="questions[0].questionText" placeholder="Type question core string..." required>
                        </div>
                        <div class="form-group">
                            <label>Options (Check the radio for the correct answer)</label>
                            <div class="option-input" th:each="i : ${#numbers.sequence(0, 3)}">
                                <input type="radio" name="questions[0].correctOptionIndex" th:value="${i}" required>
                                <input type="text" th:name="'questions[0].options[' + ${i} + ']'" placeholder="Option text..." required>
                            </div>
                        </div>
                    </div>
                </div>

                <button type="button" class="add-btn" id="add-question-btn" onclick="addQuestionItem()">
                    <i class="fas fa-plus"></i> Add New Question
                </button>

                <div style="text-align: right;">
                    <button type="submit" class="btn btn-primary save-btn">Save Material</button>
                </div>
            </form>
        </div>
    </main>
</div>

<script th:src="@{/js/material-form.js}"></script>
</body>
</html>
