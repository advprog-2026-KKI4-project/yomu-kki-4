spring.application.name=yomu

# ===== Server Configuration =====
server.port=8081

# ===== Database Configuration (H2 in-memory for local dev) =====
spring.datasource.url=jdbc:h2:mem:yomudb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
# Use 'update' as default (safe for dev); override with 'create-drop' in dev profile if needed
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Authentication / JWT ---
# JWT secret MUST be provided via environment variable; no fallback to prevent predictable keys
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# --- Google OAuth2 (override with env vars in real environments) ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
