spring.application.name=yomu

# ===== H2 In-Memory Database (default - local development) =====
spring.datasource.url=jdbc:h2:mem:yomudb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Authentication / JWT ---
jwt.secret=${JWT_SECRET:default-development-secret-key-for-testing-only-do-not-use-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# --- Google OAuth2 (override with env vars in real environments) ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ===== Actuator & Prometheus =====
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}