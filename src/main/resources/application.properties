spring.application.name=yomu

# ===== Database Configuration =====
spring.datasource.url=jdbc:postgresql://localhost:5432/yomudb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Authentication / JWT ---
jwt.secret=${JWT_SECRET:default-development-secret-key-for-testing-only-do-not-use-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# --- Google OAuth2 (override with env vars in real environments) ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email