spring.application.name=yomu

# ===== Server Configuration =====
server.port=8081

# ===== Database Configuration (H2 in-memory for local dev) =====
spring.datasource.url=jdbc:h2:mem:yomudb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Authentication / JWT ---
jwt.secret=${JWT_SECRET:default-development-secret-key-for-testing-only-do-not-use-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# --- Google OAuth2 (override with env vars in real environments) ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email