name: Spring Boot CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Build application
        run: ./gradlew clean build --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yomu-jar
          path: build/libs/*.jar

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: yomu-jar
          path: build/libs/

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-southeast2-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          IMAGE="asia-southeast2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/yomu-repo/yomu:${{ github.sha }}"
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy yomu \
            --image "asia-southeast2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/yomu-repo/yomu:${{ github.sha }}" \
            --region=${{ secrets.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --set-env-vars="SPRING_PROFILES_ACTIVE=prod,SPRING_DATASOURCE_URL=jdbc:h2:mem:yomudb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE,SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.h2.Driver,SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.H2Dialect,SPRING_JPA_HIBERNATE_DDL_AUTO=create-drop,SPRING_H2_CONSOLE_ENABLED=false,SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_REDIRECT_URI=https://yomu-543038359312.asia-southeast2.run.app/login/oauth2/code/google,OTEL_SERVICE_NAME=yomu,OTEL_EXPORTER_OTLP_ENDPOINT=https://otlp-gateway-prod-ap-southeast-2.grafana.net/otlp,OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf,OTEL_METRICS_EXPORTER=otlp,OTEL_TRACES_EXPORTER=otlp,OTEL_LOGS_EXPORTER=otlp,OTEL_EXPORTER_OTLP_HEADERS=Authorization=Basic%20MTc4MzIyNjpnbGNfZXlKdklqb2lNVGM0TXpJeU5pSXNJbTRpT2lKNWIyMTFMVzFsZEhKcFkzTXRjM0J5YVc1bkxXRndjQzF1WlhjaUxDSnJJam9pVEU0d1VrNHpaamRhZVZneGR6UkNSakEyTnpaUFF6Rm9JaXdpYlNJNmV5SnlJam9pY0hKdlpDMWhjQzF6YjNWMGFHVmhjM1F0TWlKOWZRPT0=" \
            --set-secrets="JWT_SECRET=jwt-secret:latest" \
            --set-secrets="GOOGLE_CLIENT_ID=google-client-id:latest" \
            --set-secrets="GOOGLE_CLIENT_SECRET=google-client-secret:latest" \
            --memory=512Mi --cpu=1 \
            --min-instances=0 --max-instances=3
